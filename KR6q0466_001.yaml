body:
  text: 住雞足大覺寺嗣法門人洪希編住雲南大理府賓川州雞足山石鐘禪寺上堂康熙十年秋師在嵩山受諸郡護法諸山耆舊請十一月十五日到院衆護法率諸山耆舊請開堂上堂拈請帖云見麼只者符子可以動天地可以感鬼神言言玄要字字珠璣倘或未信知事宣過指法座云瓢笠隨雲到石鐘一條竹杖活如龍才堪華首煙深處又上摩霄天柱峰喝一喝遂升告香云此瓣香揭開八尺捏聚尺八供養本山祖師迦葉尊者此瓣香河山並秀日月同明可以行四時可以育萬物端為祝延今上皇帝聖躬萬歲闔國公孤藩統千秋再及文武官僚縉紳護法請主印文諸山勤舊此瓣香十一回梁州毒焰彌天畢鉢窟前何妨再申供養前住江南蘇州府雙塔壽寧磚鏡老和尚升首座問遠峰瀑布拖飛練近壑松杉送梵音如何是石鐘境師云問得自然親進云石女到來難措足木人聞見也愁眉如何是石鐘人師云六根非不具進云恁麼則六詔重開化日五湖又扇慈風師云大家在者裏希西堂問昔日天龍一指只接俱胝今朝和尚一棒接得何人師云一箇也無進云某甲承當去也莫怪粗糙師云迦葉師兄笑未休智後堂問迦葉未入此山早有石鐘因甚但聞其名不聞其聲師云九重疊翠裏深藏不斷雲進云不因吾師指此音誰得聞師云剛才匝地又普天智便喝師云好喝只是不知落處怡宇問華首山前寶華座請師垂示大家聞師云好音在耳人皆仰宇豎起拳云青帝將傳新歲令不妨舉手候陽春師云符到奉行大旭問從上相承即不問當陽一句作麼生師云石鐘寺裏升堂進云初祖道場新雨露庭前柏子拂清風師云卻有與麼事耶石幢問如何是諸佛出身處師云山僧昨夜向松閒走一回秋水問石鐘幽韻含千古玉振金聲事若何師云一句不妨重指示千年松下長茯苓進云自此頭陀常在定剎竿倒處又重新師云惱亂春風卒未休乃云遠勞諸郡削牘加之諸山交章約山僧到山不容解包息喘即令登此座子要山僧舉揚從上宗乘以為開示當人極則一段受用大事山僧籌之無法可說只得將此共見共聞的不妨舉似諸公聊作拋磚引玉去也大衆師子林豈不四時蒼翠四觀峰豈不八面玲瓏河子孔豈不川流不息沙址村豈不各開門戶猢猻梯豈不勘辨往來太子洞豈不說妙談玄袈裟石豈不日炙風吹鉢盂山豈不常貯甘露更有鴉鳴鵲噪日往月來豈不事事見成無奈總作境會真可憐生雖然萬古碧潭空界月再三撈摝始應知張護法上迦葉初祖幡上堂拈起幡云只者花簇錦攢的是我國勳張公與李夫人男祖保於迦葉佛時般若地上種植靈苗自迦葉至釋迦老子時始得節錯根盤枝繁葉茂滋成五色寶絲縷更假巧手結成天鬘陀羅雲持以奉上畢鉢羅窟飲光尊者不獨徼福福至益壽壽延亦且與飲光老子行同虛空界住同虛空界去也畢竟以何為驗挂向天柱峰飛揚龍鳳影上釋迦文佛幡上堂龍驤龍形鳳翥鳳影寶雲交錯花雨含潤只此不思議寶火雲寶珠雲寶鬘雲寶絲雲一以先奉迦葉尊者一以今奉釋迦文佛大衆你看者寶幡飛揚時常豎窮橫遍安住時常出微妙音由是觀之一切莊嚴海一切功德海一切智慧海實從我張公李夫人男祖保自心流出山僧與麼看則有分何也不是渠儂多意氣他家曾踏上頭關請兩序上堂獨掌不浪鳴兩掌鳴聒聒所以同聲相應同氣相求的如楊岐事慈明演祖得昭覺他如昺鐵面通烏頭賢真牧才莊主其餘折花添瓶打碓曳磨第一座也有人第二座也有人第三座也有人石鐘也不裝香供養也無言說議論何故聻銅頭鐵額漢盡在我山中上堂自入山來已半月匆匆人事未曾歇忽然聽得鼓聲催兔角龜毛齊惡發築碎破沙盆擊爛乾矢橛是甚潑天門戶石頭路滑任伊佛來祖來也只叫苦叫屈咄開爐上堂僧問如何是奪人不奪境師云葉鏡湖含月如何是奪境不奪人師云蒼山雪作雲如何是人境兩俱奪師云上關花滿地如何是人境俱不奪師云下關不謝梅向上一句再請垂慈師云五九盡日又逢春問選佛場中頂天立地者落何階級師云落七問教乘即不問西來意若何師云大理弓魚皆有子問昨日石鐘寺今朝應宗堂中間不動句吾師為舉揚師云莫棒打石人頭進云詩書不習還得及第也無師云釣魚船上謝三郎問世尊拈花迦葉微笑意旨師云適才還記得進云為甚麼聻師云不獨觸風化問如何是臨濟一隻眼師云終不得信進云怎奈照天照地何師云一任夷嶽盈壑問法昌昔日開爐行腳僧無一箇豈不寂莫師云何不問今日的進云石鐘今日開爐衲子千有餘箇又作麼生師云只須薦取古人的問釋迦過去彌勒未來即今的聻師云人天衆前終不寐語乃拈杖云見麼此是二千年來迦葉師兄未曾動著的新石鐘一時著向大爐韝中用火煆之用水淬之不覺翻成一塊頑鐵擊又擊不碎鋸又鋸不開正無法可設忽然河子孔蝦蟆𨁝跳起來上告天帝天帝云不干我事下告土主祠道士道士云不干我事猢猻梯有箇猢猻約住云老蟆你只恁的奔走上下阿誰德汝且座上長老自有處分師連卓杖云快活快活將謂無殺著原來也有者箇老猻便下座上堂僧問法不孤起仗境方生只如二十里松行欲盡青山涌出梵王宮此是境如何是法師云此是境如何是法問大悲千隻眼那箇是正眼師隨聲便打進云離卻打聻師連打問昔日兩堂下喝賓主歷然如今兩堂未喝賓主在甚處師云兩眼對兩眼問某甲乍入佛法不知誰是沙彌主師云汝者一拜切不可忘卻問一子出家九族生天為甚目連母在地獄師云他家別有通人愛問庭前柏子即不問屋後栽松事若何師云臨濟道的乃云若論此事也不得道無也不得道有明眼宗師無影林中高懸日月通方作者不萌枝上暗辨春秋若是只悟自己不會目前此人有頭無尾若是只會目前不悟自己此人有末無本若要自己目前一一圓明須是木上座始得遂卓杖一下云只愁歌舞盡化作彩雲飛報國海長老歸請上堂僧問大事未明如喪考妣時如何師云一步不闊一步進云大事已明如喪考妣時如何師云一步要闊一步問雞足山中水足草足如何受用師云都來隨分進云恁麼則箇箇飽餐去也師云木人也解唱巴歌問蓋天蓋地之句即不問如何是平實句師云勸君莫逐兔逐兔損禾黍問如何是山中境師云竹疏煙補密梅瘦雪添肥進云如何是境中人師云頭上無蓬塵足下有芒鞋進云石鐘一段真消息及第堂前快殺人師云錦上鋪花又一層問十方同聚會箇箇學無為如何是無為師云誰肯拆籬補壁問石鐘結冬何處過歲師云一緉草鞋未有底德周勤舊問石鐘未扣時如何師云兩耳聽不出進云已扣時如何師云兩耳識不出進云謝和尚答話師云汝老矣幸而得聞師舉僧問雲峰悅和尚山顛巖崖還有佛法也無悅云有僧云如何是山顛巖崖佛法悅云猢猻倒上樹師云道則特殺只是使者僧不能心誠悅服若是問石鐘山顛巖崖還有佛法也無向道有如何是山顛巖崖佛法向道山光悅鳥性潭影空人心衛府祖護請上堂僧問祖師門下本無一物因甚浮山有九帶師云為他舌頭長如何是佛正法眼藏帶師云虛空吞萬象萬象總不知如何是佛法藏帶師云瀑布落潺湲松風拂蘿月如何是理貫帶師云日出海門東搏桑最先照如何是事貫帶師云夜來何處火燒出古人墳如何是理事縱橫帶師云落花春不管流得到人間如何是屈曲垂帶師云手持千里鈔林下道人孤如何是妙協兼帶師云鵓鳩樹上啼意在麻畬裏如何是金針雙鎖帶師云深林人不知明月來相照如何是平懷常實帶師云玉鞭雲外指春色在江南更有一帶請師速道師便打問一切聲是佛聲不師云莫貴耳賤目進云與麼則火爐說法諸佛立地聽去也師云火爐說甚麼法進云㗭唎㗭唎師作聽勢乃云磨褌擦褲來得兩月日矣者箇為甚有會有不會石鐘寺裏安禪畢鉢羅窟打坐為甚有見有不見還知麼甜瓜徹蒂甜苦瓠連根苦上堂僧問離四句絶百非請師直指西來意師云未升座時致將一問來進云和尚恁麼猶較馬師百步師云誰肯跛驢趁隊問牟尼珠人不識如來藏裏親收得敢問如何是藏師云與汝往來者不是僧禮拜師云把將珠來僧喝師云莫呈土彈子問昨日風今日風不從別處起時如何師云石鐘寺前不得更問著別人進云潑天白雨澍扶犁水過膝師云頭上漫漫又作麼生進云一段風流事佳人獨自知師云少賣弄師舉臨濟逢佛殺佛逢祖殺祖逢羅漢殺羅漢逢父母殺父母逢眷屬殺眷屬始得解脫師云者老漢果然有大人相真是一員作家只是未有落處所以只是箇白拈賊為甚如此聻贓物現在以拄杖一時打散月可上座請上堂僧問離婁能見秋毫如何不辨正色師云為伊見得秋毫進云師曠能聞蟻鬥如何不別絃絲師云為伊聞得蟻鬥進云和尚還辨還別不師云山僧亦不辨亦不別進云乞師一頌何如師示頌云離婁能見秋毫師曠能聞蟻鬥一椎擊破見聞論甚麼箇屁皺僧禮拜問即心即佛時如何師云船子下揚州進云非心非佛時如何師云天曉爭解纜進云不是心不是佛不是物時如何師云坐卻舌頭著進云與麼則泥牛吼處天關轉木馬嘶時地軸搖師云切忌人前走屁乃云十二月初一林下貴所適松閒立斯須望見蒼山雪連絡十九峰弄湖光日徐行踏斷流水聲縱觀寫出飛禽跡大衆月上座自粵東來也不問他青草愁雲雪積將軍之樹黃沙苦霧冰堅太史之河只如鎮海明珠作何色相還能識得者麼便下座上堂僧問付金襴外別傳何物師豎杖云為衆竭力進云某甲掩耳去也師云木上座笑汝在問如何是四觀境師云煙霞生背面問寺前一片石有時坐有時臥時如何師云渠未常不茹進云不坐不臥時如何師云獨立望何極問天下老和尚還有不為人說的法麼師云有進云如何是不為人說的法師云漆桶問世尊不說的和尚還說不師云山僧不說別有人說進云迦葉不聞的和尚還聞不師云山僧不聞別有人聞進云春色縱然全不露東風早已上溪梅師云聽事不真徒勞傳信僧喝師打三棒乃云般若巖終日浩浩商量合談何事你諸人若是總見總聞我也知你卒難湊泊若是未見未聞我也知你大相孤負事不得已吾今為汝保任此事終不虛也擊香几云見麼聞麼者一片田地分付來多時也亦似華首門放光處不論貧之與富貴之與賤僧之與俗男之與女各有一面圓光自然光光相攝不隔纖毫只是你諸人不曾理會所以見如不見聞如不聞若是但辦肯心必不相賺復擊香几云得坐披襟向後自看始得妙宜上座請上堂僧問望州亭烏石嶺相見即不問僧堂前相見事如何師云勘過了打進云若論主學人無位次若論賓和尚無位次是一邊語兩邊語師云一邊不是兩邊尤非進云祗如賓主相見合談何事師云不談別事進云原來有人師便打問如何是真佛師云如水洗水進云如何是真法師云如空合空進云如何是真道師云如鏡照鏡僧喝師云只饒一喝威音外猶較山僧半月程乃云若是克證無生頓超方便者須是胸藏六合指動大千方能打鎖敲枷去黏解縛若是提獎嬰兒撫憐赤子從苗辨地因語知人者堪作麼生不如大家歸寮且待來日看上堂僧問世尊三昧因甚迦葉不知師云汝何不問諸方進云勘破了也師云世尊三昧聻僧便喝師云喝任汝喝如何是世尊三昧僧舞坐具便行師顧侍者乃云始從芳草去又逐落花回衲僧家到此十箇有五雙花添錦上采喝盤中若是石鐘則不然八花毬子上不必繡紅旗大覺寺心宇文郁大賢供衆請上堂僧問達磨對武帝云不識由此不契乞別一轉語得合帝意去師云千虛不如一實僧禮拜師云汝猶未活在問大地平沉時和尚向甚處立腳師云闍黎頭一轉問得是問如何是衲僧本分事師云殺人放火乃云赤肉團針劄不入乾矢橛水洗不清賣弄蘿蔔頭滅卻正法眼白羖狸奴也解唱也解和蝦蟆蚯蚓也解唱也解和誰能提祖印於無影林中懸慧燈於不萌枝上者裏若是殺人不眨眼的作家戰將便請卸甲倒戈若是兜三搭四的我則目視青霄長歌緑水去也卓杖一下復舉大覺參臨濟濟舉拂子覺敷坐具濟擲下拂子覺收具參堂師顧視左右云還知二老人麼分明頌出春暖風和草木香兩人鼻孔不曾藏如今無奈噇糟者開眼堂堂入醉鄉尼廣韋請上堂僧問如何是雞山頂上一株松師云枝牚六合葉蔭十方進云恁麼則接漢蛟姿存變化衝霄野鶴可為巢師云險似昨日問如何是半提師云提獎嬰兒撫憐赤子進云雪裏分粉易墨中辨煤難師云意在射鵰翻為彈雀問若能推者即是汝心則是認賊為子修山主云若能推者不是汝心則是認賊為子意旨師云石鐘有棒不打汝進云家賊易剿白拈難瞞師云總跳者裏不出乃云平常應變妙喜室中不犯鋒鋩直截酬機灌溪句下聲和響順臺山大會齊可起叢林浴室揭榜意堪勒泉石到者裏自然入林不動草入水不動波若也畏刀避劍倚草附木不堪持論還諦信得及麼海嶽雲山都拋棄贏得莊周蝶夢長上堂風入松號泉落石響一歷耳根百劫快暢若恁麼會正是隨聲逐響不恁麼會又成逐物迷源畢竟如何囌嚕囌嚕傳衣寺虛中太安道林三上座請上堂僧問鷲嶺拈花即不問雞足傳衣事如何師云弄巧成拙問如何是鉢羅娘切腳師云二十棒寄與演祖二十棒自喫問如何是法身師云雨洗淡紅桃萼漱進云如何是法眼師云袈裟角下藏不得進云恁麼則清風高九萬一舉過須彌師云誰是窣堵那吒掌上擎驀拈拄杖擊香几云擊開沒盡藏放出無位人踏殺三賢不賸十地其餘六凡九地是甚薺粉卻在應宗堂前揚聲大叫快活快活忽被石鐘長老拄杖驀面一摑翻成一塊頑鐵及乎問他世尊傳金襴之外別傳箇甚麼他卻不知復擊香几一下便下座佛成道日南指省谷二上座請上堂僧問應時及節分明句請師為衆廣敷揚師云猿抱子歸青嶂裏進云自從一睹明星後無端鈍置到今時師云百鳥銜花竟不來問如何是戒師云珊瑚枝上月進云如何是定師云荷葉盛玉露進云如何是慧師云一呼知四事乃云居城郭時看擔來負去者日無休息更有誇經紀較重輕瞞天說價就地還錢雖則一一天真各有所適一往看來實可憐憫及入山來聞松聲澗響者亦日無休息更有起秀麗含赤丹麋鹿為伍鳥雀作朋雖則了了無猜共相馴伏一往看來亦未是妙還知本分受用處麼聽取一頌十年領衆住昆明官長往來苦送迎此日石鐘洞壑裏等閒贏得住山名華首歸上堂山僧有一樁事不得不舉似大衆適才大衆同著山僧到迦葉殿喫高居士齊轉向華首門眺南雄清秀西洱汪洋北勝與劍閣相暉東山並麗水聯絡山山蟠鬱岫岫回嵐百川溢金沙大壑飛霞聯碧落千峰回玉浪天柱摩蒼透銀河牧者唱樵者歌聲隨巖谷雨以時雲以時景逐溪光既與諸人眼同見耳同聞為甚背地裏卻道也有到處也有不到處大衆不見道未達境惟心起種種分別達境惟心矣分別即不生喝一喝下座上堂僧問袈裟之下還有失落人身的也無師云怎怪得山僧師舉趙州到臨濟濟問如何是祖師西來意州云正值老僧洗腳濟近前作聽勢州云要會便會更啖啄作麼濟便歸方丈州云三十年行腳今日為人錯下注腳師云二大老恁麼要且無祖師西來意若人揀點得出到方丈通箇消息上堂僧問和尚登雞足入華首曾親見迦葉也未師云者鈍漢甚處回避得來進云祗如相見時如何師云放他一頓進云恁麼則石門不久閉也師云門裏道將一句來僧喝師云此是門外的進云門裏的請師速道師云兩口一無舌問如何是即心即佛師云頭上角未生進云如何是非心非佛師云腳下毛先出問如何是如來禪師云如是我聞進云如何是祖師禪師云禮拜了向汝道問如何是佛師云三腳蝦蟆跳上天乃云山僧與諸人赴牟尼菴齊了登鉢盂峰見盤松下三三兩兩論及山形水勢神怪靈奇云塔盤山曇華箐虎踞龍蟠石廠洞聽松亭鸞翱鳳翥傳衣寺接待寺七縱八橫辭佛臺火雷坪上九下七正辨論閒被石鐘長老撫背一下云唯不見道才有是非紛然失心你者一隊漢只恁麼論說機境有甚用處一隊漢聞山僧與麼道即便開悟而去如今恁的舉來也是幾度金沙波浪急一番流洗一番新龍華寺萬行上座請上堂僧問世尊拈華迦葉得傳心印如何是他得處師云珠拾泥裏進云曹溪風幡印宗得請出世如何是他出處師云采喝盤中乃云寬廓非外蝸牛角上鞦韆寂寥非內蟭螟眼裏鬧市若是內不放出外不放入上無攀仰下絶己躬淨裸裸絶承當赤灑灑沒回互我也明窗下安排復舉龍華照布衲問溥上座那一片向甚處去也溥云莫妄想照云失卻一片也妙喜云自倒自起師云布衲無端放尿先自失卻一片妙喜因人成事後卻拾得一片且如目前無法者一片又作麼生論量良久云月落後相見上堂舉睦州道未得箇入處須得箇入處既得箇入處不得孤負老僧師以杖畫云陳年葛藤不如一筆勾下又舉初三十一中九下七盞子撲落地楪子成七片復以杖畫云陳年葛藤不如一筆勾下大衆前一畫且止後一畫作麼生又以杖畫云者一畫也有權也有實也有照也有用諸人如何會山僧終不把古人言句牢籠學者塗污俊傑須是自信自悟一一從胸襟流出方可盍天盍地委悉麼便下座上堂僧問如何是誕生王子師云六國不承顏如何是朝生王子師云蒼生得噓植如何是末生王子師云承明輸論策如何是化生王子師云邊塞絶煙塵如何是內生王子師云萬邦仰聖聰乃以拄杖畫一畫云住山翁樂無窮奇奇怪怪玲瓏石丫丫叉叉古樹松不假安禪已純毒龍談實相論真空復畫一畫云古木無人徑深山何處鐘華嚴寺玄印上座請上堂僧問如何是入門句師云且開裝鏡當軒立如何是門裏句師云垂簾晏坐卻忘疲如何是當門句師云樓頭畫眉自分曉如何是出門句師云踏斷青山不計程如何是門外句師云林下何曾見一人問二僧同去捲簾為甚一得一失師云拳頭巴掌論疏親乃云福城東際事東際水和煙要見摩頂處隔在海南邊石鐘與麼不惟善財趨向不及直使老大德雲縮手腳有分其餘主天神主地神主山神主海神主林神主樹神又敢動著一絲毫耶獨有文殊猶較些子以目瞚普賢普賢撫掌呵呵大笑無厭足王見得卻借石鐘拄杖出氣云無相如來入此殿是故此中最吉祥二大士搖手云你賣甚麼措大拋下拄杖云一齊穿卻鼻孔南安烏龍寺慧實上座請上堂僧問明頭來明頭打暗頭來暗頭打時如何師云只恐不是玉進云四方八面來旋風打虛空來連架打時如何師云是玉也大奇進云有意氣時添意氣不風流處轉風流師云泥裏不得著土塊問如何是山裏禪師云林深多虎跡巖嶮挂龍姿如何是城裏禪師云往來朱紫貴問答各耆年如何是村裏禪師云鋤雲猶未了木耙又上肩乃云南安烏龍寺相去隔鄉里夜來到此間相逢各彈指擬議則千差笑領則一矣既不離箇裏不即箇裏又說甚麼此是吾宗旨上堂僧問若立一塵家國興盛如何是一塵師云生也進云一塵既承指十處一時收師云未必得恁麼快問學人一向無消息請師指示師云何不早問問選佛場即不問如何是石鐘真境師云風來耳畔日照高臺進云莫落聲色也無師云伶利衲僧向後自看乃云嘉平草二大好取譬百卉蟠牙寒梅唾蒂無情尚自若斯衲僧得不伶利未舉已前胡不瞥地既舉而後渣也無漉甚麼屎屁上堂僧問乾坤之內宇宙之間中有一寶祕在形山是甚麼寶師云兩手托不起進云和尚莫瞞人好師云闍黎不得無過問如何是學人著力句師云切不可付在來日進云如何是轉身句師云飯食經行繞數遭進云如何是親切句師云伸腳還在縮腳裏乃云不向佛求不向法求不向僧求三文大光錢買箇腰支柔面不洗髻不油知他是凡是聖終日在樓頭手中把箇破木杓更嫌何處不風流法心上座請上堂僧問德山侍龍潭潭然紙燭遞與山山擬接時如何師云要接有甚麼難進云恁麼則電光中垂手石火裏遇人去也師云未然紙燭道將來進云三更日正紅師云他夢猶可事汝夢更愁人問大顛擯首座過在何處師便打云向後自看進云大冶精金應無變色師云早是變了師舉慈明示衆云一切賢聖皆以無為法而有差別前是案山後是主山且道無為法在甚麼處良久云向下文長付在來日應菴云天童也著一隻眼一切賢聖皆以無為法而有差別西瞿耶尼東弗於逮南贍部洲北鬱單越到處去來不如在此師云石鐘雖是他腳下子孫終不借婆裙子拜婆年何也不見道待兔守株終非神智遂舉拂子云一切賢聖皆以無為法而有差別洱水回瀾蒼山積雪天柱崔嵬羅川曲折其餘一山一水一宮一闕爇甚麼沉檀著甚麼矢橛煮普耳茶喫了正好瞌睡印文上座請上堂僧問隔牆見角便知是牛此人如何師云筠袁虔吉頭上插筆乃云曹溪浪上魚躍鳶飛熊耳山前猿啼鳥笑爭如者裏師旋象馭虎驟龍驤洵可樂也無奈雲門又道箇臘月二十五甜瓜徹蒂甜苦瓠連根苦金剛𥅄眼睛鐵蛇鑽入土三腳驢瞌睡虎祕魔叉馬師斧雪峰毬禾山鼓既是同肝共腑又何必頻拈白棒打青天更將鐵鋸三臺舞南指法輪良因三上座請上堂僧問寒暑裏還有佛法也無師云無進云為甚麼無師云寒即寒熱即熱進云寒暑中和尚如何回避師云冰簟鋪暖閣乃云東山水上行白浪滔滔西河火裏坐紅光焰焰惟一堅密身一切塵中見擊石火閃蛇電倒騎鐵牛入覺場無端拂著空王面悉檀寺院主仙陀請上堂僧問古澗寒泉時如何師云浸殺的不是進云飲者如何師云噎殺的不是進云某甲放身去也師云甚麼年間得出僧乃喝師打七棒乃云收足蒲團一月循循如法安居仙陀卻有妙智釣起山頭白魚且如秦地不收漢地不管底如何安頓得他下千峰披蓑側立五老引水澆蔬上堂舉僧問香林如何是衲衣下事林云臘月火燒山師云恁麼會刺瞎眼睛不恁麼會築著腳跟正恁麼時如何驀豎杖云將謂春歸無覓處不知轉入此中來
