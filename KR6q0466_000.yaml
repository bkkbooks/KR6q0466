body:
  text: 益州嵩山野竹禪師後録序世祖朝今天童山曉皙公禪師説法長安之隆安皇帝萬機之暇常以步輦幸其寺至則握手上殿就坐論道幾如賓朋維時扈從之臣以為榮曉公則淡如也夫世之人得富翁一諾即起色十倍況人主寵沃如寮友其衷不動有如曉公者乎若非蕭然名利之外萬慮都盡亦何能臻此哉余時掌院事無事必過從過則曉公必掃一室坐余其右燒香瀹茗發五嶽之高論揚袂掀眉倒千江之雄辨於是乎法門細大古今得失歷歷可見乃今知馬師以還東山父子而後至臥龍仰山及金陵翼善海舟慈公凡八世皆鍾岷秀吐詞為經真大有為宗工宿衲故上而朝廷內而當軸外而群宰輻輳問道莫不虛而往實而歸至或策駿爭鑣而惟恐其不獲一聞緒論者總之得盡性真理超然遠詣確乎不拔絶不可馴至乎塵網者也張子謂儒門淡泊收拾不住皆歸釋氏至此益信一日曉公惠益州嵩山野竹慧公禪師語録一部凡十四卷讀之言詞峭俊多發為名理詩頌清新盡黜去瑕垢或置之恕中南堂間不能辨誰恕誰南或置之昭覺妙喜間亦不能辨孰覺孰喜其果得天童悟報恩賢之家法長松璧公之血骨為挽近世一翹楚也邪且見桑梓巴渝與曉公同邑又曉公猶子前謂皆鍾岷秀吐詞為經大有為之宗工宿衲儒門收拾不住今又見於此也無何曉公抗疏南還余作詩送別十年來不得再晤一吐所欲使人遠想故人夢寐不置兼想見竹師亦如想見曉公者久矣今秋竹師門人集後録又八卷不辭萬里走力就正曉公於天童而曉公聞余念己亦念竹師乃馳一函為介并以後録寄余且曰思欲見其人而不得孰若讀其人之集如見其人焉倘不吝一言辨於其人之集之首使其人亦一見公之言而讀之如見公焉此非所謂兩思而兩得見絶非旦莫之遇而有離合悲歡之間也哉余讀竟喜曰較前録則潤而色老而蒼益知竹師所詣近日知解宗師斷斷不可及也余因是曉公之言歷序與曉公往還之久暨得竹師前後集讀之之意乃筆以辨竹師後集若作序竹師大意則吾豈敢康熙十一年壬子孟冬光祿大夫禮部尚書加一級侍經筵庚戌會試正主考前兵刑二部尚書都察院兩掌院事左都御史乙未甲辰庚戌充文武殿試讀卷官戶刑二部左右侍郎翰林院提督四驛館太常寺少卿吏禮兵科都右給事中同甲戌進士出身淮南龔鼎孳撰序余家在梓之遂寧涪江一水由梓趨渝至溫則東矣若泛溫溯梓或云阻長自梓達溫輕舟順流頃刻可至即五百里之山川雲樹室廬相去猶莽蒼也顧余幼在江寧長居帝里親朋耆舊久闊星霜風景故園徒瞻明月而其間或有高賢蘊璞潛德幽光在所疏缺者復何限乎一日偶過垣中渝州雙山劉子案頭見有嵩山野竹禪師語録詢之方知嵩山為益之名藍而野竹禪師為吾長壽之名産實蘇之雙塔磚鏡璧公之世適也闡道德之深微醒人心之本有縹緗數帙等於貝文不幾為吾鄉江山生色邪其語録乃因人説法靈變莫測而録中間載七言五言小詩及絶句細讀之不過借彼宮商揮吾理奧豈必如唐人之琢工月露雕刻形聲哉要之名理既到而形聲月露之詞未常不在其中昔惠琳兼內外之學惠休賦碧雲之篇遠公蓮社東安議林既具原本自標緒餘方之於斯真稱伯仲矣居山谷者聞足音而喜違故鄉者讀鄉人之集如晤故鄉之景倣佛涪水之濱雲樹室廬山川人物歷歷在目差慰遠思而況乎其寓言妙義使人渙然以悟邪因筆寄贈即以為序可也康熙己酉孟秋賜進士及第內祕書院侍讀學士加一級安南正使賜一品服李仙根題序嵩山者昆明之精藍也野竹禪師慧公者渝之長壽人也生有異質智趣不凡幼即皈心紺園未常就里孰學既潛心釋典精進苦勤始而護珠終而捨筏融徹四諦貫綜六經謦咳希微揮毫珠玉豈非攬英秀於江山秉實學於神哲者哉早歲歷永昌郡紳士瞻仰嗣復振錫嵩山弘開誘掖由此觀之宗門之中亦具有經濟乎先是嵩為會城名勝歲久頽廢前輩大師如天童悟浮石賢磚鏡璧即師之世次然道燈雖傳法力未遍師至有所感孚所以當事群公聿來護法未五年一旦改觀飛甍藻耀密宇幽清璚露風甘金雲日麗化城既闢而入其中者無不生已度想余戊申冬以調補來滇越壬子春育之張公瑋師之鄉人以嵩山後録相示披閲之餘如晤師旨矣師常言箇事人人本具説箇甚麼則無端而後録豈師之心哉又言只因人薶沒家珍妄自馳求所以種種譬喻無數方便使人晤明心地則後録又烏可已邪竊自思之自馬石至臨濟曹洞支派雖分心印是一則師之精警此一大事即坐為禪不坐亦為禪言説講究為禪不言説講究亦為禪何適而不可余雖未識師因張公而得後録因後録而得師聞聲愛慕寧在班荊傾盍間乎爰敘其事以辨後集庶使嵩山一片席不愧慈蔭大千賜進士出身文林郎原知河南新安縣事丁酉本省同考莆田俞遜思園題序昔菩提達磨親承跨水逢羊讖記見赤縣神州有大乘氣象遂踰海西來化行震旦而此土中人獲聞無生妙諦共登上乘者千二百年矣其在今日惟三吳兩浙剎竿相望説法如雲不幸而生遐陬僻澨有畢世不聞佛法者則有緣無緣奚翅霄壤隔矣雖然性猶水也禪猶舟也高原大陸水性恆存而大施般若之航力鼓先登之楫必待其人後行耳野竹大師者生緣巴蜀倡道梁益為磚鏡璧老人嫡骨種草報恩浮和尚真孫也當其幼遭兵燹骨月凋殘便得覷破幻緣慨就芟染已具大勇猛大智慧大解脫與尋常托迹沙門者實相徑庭逮其死心參究過溪舉首頓悟萬法歸一落處所謂從緣薦得永無退失從此聲為毒鼓味具鴆糞令大地衆生略霑些子罔不喪身失命試讀其慈雲嵩山諸録簡確淨圓了無賸義若紫帳珍珠不輕拋撒而一往見寶其間理事洞融人法雙顯般柴運水總是玄機顧鑒嚬呻無非妙理師謂立賓立主絶滲漏於機先有實有權驅聖凡於喝下斷斷非誣也茲門人復輯其雞足山新録一編不遠萬里介吾同門嘯堂和尚問序於余余讀之咬嚼不破儼蚊子之上鐵牛機鋒不停恍隔窗之睹走馬而且病點五般話商兩錯真覺目前大道八字打開坐地長安一超直入較之從前諸録更見惡辣因嘆師為嘯公猶子同生巴渝咸屬悟祖法裔今嘯公令行吳越師則建幢嵩嶺豈非地靈人傑嫩桂久久愈昌歟夫達磨初來五度受毒際會未諧如愚若訥師於碧雞金馬之間開法未幾緇素景從飆馳雷震神通妙用當必有大過人者余敢不望空遙禮曰梁州古佛出世也哉康熙癸丑嘉平浙鄞蟄菴道人本秀錢光繡聖月氏沐手拜題益州嵩山野竹禪師後録目録第一卷上堂住雲南大理府賓川州雞足山石鐘禪寺第二卷上堂住雲南大理府賓川州雞足山石鐘禪寺第三卷上堂再住雲南府嵩山禪寺第四卷法語附小佛事第五卷書問第六卷歷代祖圖真贊附諸祖贊第七卷雜偈第八卷雜偈附補遺目録終
