body:
  text: 梁州門人宗釗編雜偈示徹元張居士道無兩塗事非一向孰聖孰凡何順何障月印幽潭雲生東山可明可暗把火自看示徹龐黃道婆知是插叉何貴掩門拋餈起舞芝茁蘭蓀佛理祖禪不別是說照世一珠惟此明月示徹淵劉居士聽此瓦礫理事無礙秋江月明誰成誰壞得大乘宗是非一如酒樓肉案道在屠沽示徹海梅居士示汝五性有斯妙旨鳥語松聲充塞其耳得是返聞同歸一心一心之要非淺非深示宗冰李居士少室無禪毗邪無說打鎖敲枷解粘去縛道曰強名修證亦非大塊若粒何處著錐示徹海劉居士欲透樊籠請益禪學垂足示之煙水漠漠踏上晴峰其見邈然勤而行之汝勿忽焉示徹雪廖居士春草池塘田農畝啾啾莎雞轉面芻狗松間夢鶴野外雲津同是秋月皎皎無塵示宗旨楊居士苟無取舍非道而何智者通局癡子守柯以此論心不失其旨煩惱真如不二而已示徹達王居士心在尋常其理甚顯井蛇齧鼠此喻莫緩論心論性胡尾胡頭得是真精可以隨流示徹義黃居士涉塵沙劫耀空之電絶理事機驅暑之扇嗟爾春禽關關竹閒我觀佛理非有兩端示徹旨王居士知我彈指乃得厥旨透祖師關覆掌而已危險之訶發自鳥窠不立賓主智是仙陀示徹玄李居士一心不生萬法無咎我觀智人本非先後坐無畏床鼓此宮商擲下拂子是賊是贓示徹教李居士佛無虛語教有明言治生産業入理之原是法非法一一奚守如彼太虛為誰點首示虛碧李居士戀此桑田沙黏壁畫可易可難終歸一壞手舉須彌輕若鴻毛衆生及佛在此一豪示宗真李善人以指示人指端有旨轉為指物障翳先起看彼輝光莫過俞龐更有一人鄭十三娘口占蒙七與多扆青帘縣酒家道傍何帝碣大半入泥沙寄雞足良因禪人葉鏡湖中月葡萄江上山無花果自熟此意好生看示葉榆道雍行者玉案千峰裏松花可食無羅浮秋有月纖纖上白榆辛亥春見好事者作僧史信意喜怒略無公心不覺浩歎因覽升菴公集載西遊雜述云虎穴猶能入猿梯亦可臨把關貓子面開店主人心濡墨乃感和二首佛魔相出入坦路不登臨可歎如來後翻為取舍心又喜怒馮出入顛倒亦登臨弘法真有意當秉祖佛心碧雲寺山深多白雲地僻無人過日上三竿竹階除麋鹿多賦得白鷺鷥自是瑤池物別群南徼中三步一顧影何時歸板桐九月桃花勝放殷勤在二月不聞拂秋霜自是今年別溪頭兩度芳青平入望青平噪早鴉斷橋流水野人家駐看遠墅晴嵐裏幾樹茶花亂曉霞祿脿水繞西南鄯闡居育王遺跡久荒墟龍山有店曾留宿暮汲螳川煮野蔬雲封草鋪舊曾遊此日重來野樹幽故老不知何處去空遺瓦灶冷煙浮白邑村水曲山彎白邑村臺荒樹古暮煙昏停車一問桃花店痛殺絲蘿挂石門鴉關負去擔來萬仞山雲中一鶴自東還南方十月無霜雪不待雞啼早過關獅口萬谷虯松一色斑山重水也水重山獅村人盡荒基在留得殘碑臥草閒楊老重看楊老石何奇遠樹環煙接水湄望斷荒村浮暮色山山紅葉帶霜枝懷古星宿河邊楊子詩墨花猶作舊時疑誰知此日碑橫草字食苔花更可思淨蓮菴秋終又過淨蓮菴茶煮流泉在石龕隔嶺漁樵喧去路雙雙野鶴下煙嵐響水徼外雄關響水西山巖如筍插蠻溪烏啼蘭谷秋天晚野店重來寄杖藜碧山茶花賧地山茶映雪開清芬款款過溪來如何此種藏深壑不到名園鬥碧梅雙門平明拄杖上雙門西望晴川八九村犬吠遙聞霞谷裏林春雲子落松根趙普關日午停驂趙普關猶愁嶺下鐵衣還當年不取封侯印未必南征過此山早發廣通雞啼荒落瘴煙明又促征夫未曉行林外紛紛黃葉落秋山黯淡一峰晴望鹿城日夕泉流石澗旁漁蓑數點近波光迢迢野徑通城郭戶戶炊煙曳練長石人借問何年來此地風塵未息爾曾知南宮不過休相望莫厭緇衣頻寄詞仙人骨雲峰堆裏深藏骨能使清名遍五湖一任人間有此病不教扁鵲又糢糊石鼓城一到城邊秣馬堆草橋流水自北回淵淵清越無人在自古名成骨已灰白雲寺白雲山寺逼青霄一上峰頭破寂寥野鶴無心天地外秋風十里動松濤沙橋野草荒煙古碣斑我來松下寺僧還共枕沙橋悲夜月明朝又去小孤山煉象不到象崖已十秋山光猶接舊時眸枯腸搜盡無佳句幾負煙中碧水流武英關曳杖秋來到武關愁雲漠漠繞空山上林殺氣連峰起獨有緇衣似等閒緣蘿泉獨在梁州住十年重過弄棟煮甘泉一杯誦罷揚雄賦笑入江城落日邊望蒼山姚雲分處看杉松一葉西垂一葉東莫使連天一樣碧依然雪月又相同小雲南雲染胭脂埧水要一棚清趣也堪描山名波浪橋名五木狗而今夜不哮弔楊聞谷居士自釀老春西洱水閒攜獨醉點蒼雲如今漸化邙山骨不識梁州誰憶君郭居士年來愛住尖頭屋數盡池花三兩曲若是黃頭碧眼胡愁腸慢寫寄金粟贈道者一色霜風透骨寒疏燈在壁冷誰看林間不是修山主肯向藜床話夜闌望九頂不盡溪山繞碧岑嵐煙望去邏茨深岧嶢樓閣層雲外似聽疏鐘送曉音晚過賓陽張州牧別業湖山倒影日西斜對坐波光論井蛇借問古人誰得似輞川風度屬君家金牛山經煉洞贈白雲居主僧負杖金牛薄暮天青霞踏碎草鞋前遙看煉洞千峰裏百里松陰落鴈邊拈華寺贈德解破雪遙過百接橋擔瓢不負白雲招山房說盡平生事坐對殘紅又一朝十載昆明老杜多釣竿擲盡冷漁簑今朝得到拈華寺煮雪分題詠緑蘿夜雪邊雪飄飄下夜郎山窗茶罷恨偏長茆房不斷三更火杳杳鐘聲到客床蘆花澗望靈峰雪積蘆花未見消更無客過洗心橋靈峰惟有啼猿在常叫三聲下碧霄雞山八景天柱佛光萬尺峰邊絡綵霞休云石穴隱靈蛇名山自是真人地瑞氣終歸佛子家華首晴雷重登畢鉢聽晴雷每見羅川晝晦開百尺飛濤天際落寒聲不盡隔黃梅蒼山積雪望去蒼蒼積水隈華銀半是白崔嵬應知塵俗終難到獨許幽人踏碧苔洱海回嵐葉榆一水繞羅峰雨霽還看翠色重莫道晴霞看不足又隨夕照過芙容塔院秋月名標尊勝此雲峰勢逼南天雪嶺雄夜靜回眸霜雪裏清光凝是水晶宮萬壑松濤山風翦翦瘴煙晴碧樹重重午夜清若是書成休寄鶴恐伊唳作斷腸聲瀑布穿雲練拖一幅下天河日照雲邊雪更多寄語匡廬休獨步青蓮曾此下絲蘿重崖返照木葉遙遙帶夕暉胭脂紅起映巖扉尋常倚杖雲邊立亦有松聲落翠微華首門苔封石戶幾時開彈指也曾出定來可愛蒼巖臨萬壑一聲啼鳥下崔嵬示非緣肖善人梁城三月雨初晴處處踏青過柳營可笑遊人渾不省依然杯酒醉沙汀示宗理鄭善人時節催人可懼哉桃花又向圃中開婆婆若解靈雲意歸去何妨樂茗杯許使君見過不遇即原韻答之附原詩公諱虯麻衣帶曉青山去不鎖柴扉廠白雲薄莫歸來詩字在文光冷冷射微曛水空山淨連紅葉磬冷鐘鳴斷白雲野竹老人何處去別峰相見隔斜曛寄松語寄語山林道者流生柴品字煮清流有時忽地翻茶銚始笑從前苦話頭壽玉章饒居士庭中柏子霜前色洞口桃花劫外香此日管弦人盡樂三千珠履醉霞觴代天童化主巨唯兄化米昨日天童書信過雲廚要米飽禪和嵩山無力輸千石敢告檀那意若何己酉冬觀王出獵王宗語居士索書鼓角樓頭未曉催吾王牙帳在崔嵬千旗共喜隨雲轉萬騎同歡帶獵回過關嶺山頭款款白雲飛一片氤氳上衲衣本自無心隨去住如何也伴老僧歸冬日示守真宋居士心隨萬境境誰真心境無依是道人莫守無為行有路時時始得與心親示三學萬指叢中看不足只須直下絶三學忽焉打破囫圇的始信溪深長柄杓示宗語王居士萬竅怒號誰為口百非坐斷亦莫守塊然無證亦無違法法頭頭信我有寄張邑侯耕煙老居士諱方起夾道多開七里香苑中也勝百花王他人爭看公休晚又恐朱明到草堂贈密化雪霽林東好采樵寒猿曝日向山腰閒居野趣惟君得弄盡松筠月下簫贈嵐波看盡山松與谷蘭歸來無事倚闌干有時月下清機發卻把無弦曲調彈答獅子林怡宇深慚老去住昆明十載難逃世上名猶恨生平無定力又移竹杖過江城贈大智菴覺仁覺空空處可無塵若論到頭未是真只是家私都罄盡惟餘明月可堪鄰偶成散步長廊月自來孤光一片遠林開天花未必霜花落寒色清人滿緑苔乘閒拂紙寫詩篇寫盡溪山不計年寄語故人今夜裏韻成仍寄白雲邊寄酬雞山石鐘嵐波勞君六月苦行役白紙書情寄葉榆把出有時須自看其閒一字也曾無贈本寂副寺當年寶壽賣生薑贏得芳名萬古揚此日石鐘本副寺眉毛罅裏更成霜贈嵐波首座道者名傳世已久石鐘得意亦非偶袈裟石外白雲消遙見嵐波西洱後贈松波堂主山南晴去聽松波散入高天韻自和自是清音人不識馮他狼藉遍煙蘿贈蒼波首座金山初日照蒼波緑樹輕陰舞翠多始信昜春真有腳千回暖氣高嵯峨贈良因監院良公有意輔叢林海會芳名又見今獨有石鐘翻舊案無勞撾鼓逼同心春日同友登大士閣似一心自到山城雪未休如今始見日初浮春光從此開河嶽茗碗茶花得自由答寂光寺深修拍板逢場便唱來諸人只要眼雙開眉閒若有些兒礙依舊從前被他薶答御凡寄語山林書一行松蘿深處得疏狂欲知樹倒藤枯句只問前村李二郎題白雲居天池即高捷曾先生隱處亂山深處白雲居古木蕭森緑滿除庭下有池清如鏡跏趺盤石數遊魚寄松波主人見說雞山道意隆故將心事寄清風月來峰上如相望秋老方能過懶融答雞山大衆薄福年來袛自迂何當祖席讖相符諸公不厭巴人曲可待西來弄鷓鴣送大旭金地遙招欲起余碧雞三宿便回車他年不負祖庭約從此無勞再寄書示宗本葛善人蒼山積雪覆千嶂黑水吹波繞萬松祖意西來都漏泄如何別有好家風示童子明敏都來夙有由讓梨揖酒爾還優嵩山更授靈童意一句明明六不收示雲蹤雷居士看看桃花暖氣和龍門巨浪蹴天河乘時好躍隳三級莫待春雷燒尾過示趙善人三翻四覆上嵩山欲透油餈上上關若是踏翻階下石回頭月在白雲閒示知幻善人晴天遠望春蒼蒼鳥逐飛煙下夕昜識得東兮即是北不須別處論行藏訊圓通貫一禪師病螺峰春色漏天東又向千巖看病翁曾憶圓通生藥鋪貓頭合劑效如風春日答楚雄許別駕正是林間報歲除梅花已放到山墟曉來又得昜春信署裏定知景物書示宗鏡刁居士即本甸土舍者樂長官亦好道嵩山老衲也通方拳頭豎起無他事不是愁人也斷腸贈存之張居士覺照寺前張道者時時在定倚窗櫺總來得到毗邪默何用高談了義經寄蒼舌道者九年少室甘磨折一日逍遙入萬松月皎星稀鶴夢冷不知身在白雲峰送蒼舌知客吳門代省裝束衣囊去夜郎身輕萬里到平江閒時若上生公石海湧峰頭月照窗哀牢南下望長沙買棹隨流趁曉霞若到閭闔城上日趨庭方喜飽胡麻贈宗鏡羅太極居士十載雲南竟不違喝來棒去絶離微從今付箇青州襖省佚軒前春自肥寄雲夢法孫昆水東流草木春從𨹁北接夜郎雲山山水水如何取大抵先須絶見聞尋玄鑑遺蹟示釗侍者鴨池城下海波流玄鑑遺蹤可在不四百年來彈指頃高風此日孰堪儔贈昌侍者嵩寺老人白髮垂長松家法有程期歸來不負平生志折腳鐺兒要汝支送戴綸之還句容走遍梁山始買舠歸帆北發正秋高洞庭行過五千里得到金陵可解韜中秋對月分韻得花字秋色平分望海涯時聞林外雨催花夜深杯茗情難盡又到閒房笑績麻與蹇文山居士要論諸方五味禪不如歸去且高眠一方明月如秋水文山文山可了然贈江陵鱗長馮居士鶴下龍洲碧草竿漁歌虎渡緑楊煙江陵境物君猶記者事如何未悄然辛亥六月大水紀事蹴天風浪駭飛鴉捲盡田廬作海涯即有舟航無路去銀河誰肯借仙楂贈宗孝閻居士孝關東人藩下擺牙喇也割股救母母終不痊當母喪時又然身燈六十八盞供佛以資冥福故表而出之我聞古老孝無遠刻木鑿冰近日稀昨日梁城聞細柳始知戲彩屬征衣薦董護法鐘翁翁宦遊終於平陽白髮垂垂六十霜黃堂幾度動柔腸如今踏著來時路回首西川日月長弔沈總戎諱應時平生俠氣慣沙場履雪眠霜誰得失夜來撒手得回光滾滾紅輪偏界赤薦胡門姚氏昨夜回光息萬端馮他性海起波瀾陶然信步東風裏翠竹黃花一任看中秋謾興敲石烹泉獨酌時清虛一色冷山墀寒砧搗碎溪頭月處處霜花結桂枝把盞問月華茶烹熟酌玻璃此夜開懷一問之前日雨中何處去倪裳不見舞東維喬松棲鶴澗上牚雲不問年雪衣舊好冷巢邊春秋雖邁情何極一任陰晴得自眠思親萬里悲風起暮秋一身多病臥梁州深慚興化當時事此日徒懷蕭寺頭苦雨寒蟬幾樹冷凄清不見峰頭半刻明借問銀蟬何日至為人一掃海天晴蟬鳴樹底景物催人雪滿頭又聽葉下報高秋誰知故國多年恨不在成都錦水流疏竹吟風疏疏緑葉覆龍孫一樣吟風在故園何用梅花開笛裏江城聽得便消魂聽上方梵唄宮商向曉落原野又見隨風來上下借問同人知不知青天白日何為者池成月自來鑿出盈盈十尺水波沈細看月初生誰知此夜寒鉤淨印破池心一片明雁行字寫秋空一兩行飛飛南下到衡陽如能肯帶平安信為余問訊白雲岡玉梅糝盡一溪傲雪骨奇香不為熱腸開祗應寄訊羅浮月仙胎已放碧巖隈壁上梅花數點紅霞映壁來清香一為主人開莫言已奪天工巧信是廣陵折得來看菊無人送酒到僧寮白石籬邊一醉陶看罷夕昜新月出乘驢又上石溪橋步月微雲望去淡晴空閒步松庭韻不窮遙憶故人俱在北未知何日到溪東嵩山晚眺杖藜晚步到春山十里煙花杳靄閒自是芒鞋行不足歸來已見月珊珊聽琴玉几冰絃指上挑高秋夜靜落松濤更勞彈罷關山曲倦倚窗前月正高洞庭秋月倚樓一望楚山孤素練清暉冷碧蘆夜半魚罾歸北浦湖波寂寂冷秋菰昆明八景昆池夜月霜鴻欲下夕昜低送盡樵歌上柳堤若泛清波須載酒孤光一片在城西商山樵唱風清款款響晴坡竹樹參差隔薜蘿只待夕昜催去後煙霞十里鎖巖阿金馬朝暉華峰一帶是漣洏汗血當年躍此池留得朝暉看不盡至今猶說子淵碑碧雞秋色雨洗煙巒聳郭西飄飄黃葉落漁溪此時共看疏林晚一色秋光映柳堤雲津夜市茆舍津頭夜火遙年年北客醉春宵燒鵝卻是南中物說與北人好駐鑣官渡漁燈江城郭外木郎村曲曲蘆彎爭渡喧雞鷘看人情已熟尋常相逐釣舟翻螺峰疊翠小小幽岑看益奇誰攜春酒醉相知我來石上頻相望楊子曾經舊有詩龍池躍金浪浪如銀滾石門春來每見錦鱗翻也知爾是乘潮物何不天飛苦自冤洞庭山月秋高正有湖心月萬頃寒光映碧梧縹眇峰前人未臥不知誰在醉姑蘇望華山飯罷池邊步野郊一望雲中白鶴巢借問東風何大緩猶存殘雪在松梢禮千佛名經示衆昔問長沙何處去報云詩在黃鶴樓分明底事人難識錯認光明在指頭
