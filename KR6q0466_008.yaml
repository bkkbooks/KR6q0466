body:
  text: 廬陵門人宗昌編雜偈贈千翁王總戎都護邊城重牙旗在戰壘鐵衣塞上雄九重嘗賜璽西南既已肅養馬青山裏簫鼓與民樂英風生萬里己酉秋送王公北上清名南徼外治化齊龔黃碑石新磨礎民歌草木香行裝真有日借寇竟無方誰道百蠻蠢也知循吏良昔升菴公謫滇而滇之煙瘴險惡公履之自若也余至滇觀其景物絶不相謬壬寅主法嵩山問公遺跡有僧乳峰者言公儀表類余余笑曰公誠大儒才學俱高余一陋質何言類邪又言高嶢有祠亦可證也待訪之不果己酉方伯李公去官浙惠公內外全集展閲至續坡翁浮雲妒佳月奇怪世傳坡乃戒公後身今又言余似楊豈升沉之言絶不虛邪遂感而賦之羊鹿駕險道螳螂當岐路惡蝎駭蜂蠆汃棚軋長輸下門能負山苵儕杕杜長門司馬風偃嶽肇公注浮雲妒佳月忽然省世誤示化一堅冰二知客兼示夢周送往迎來事照顧離弦箭好箇走盤珠莫作空裏電言談宜及時母受景風扇入門看賓主登堂著方便一朝大夢破無限奇珍見奉和耕翁居士嵩山夜話是夕翁作碑跋翦蠟情未已攜壺向東閣紗窗映晴星香泉流夜壑微雲淡淡來白月正寥廓寒色起青嶂水光搖碧落高峰露欲肥喬木夢老鶴更深鐙火殘風霑蘆華薄搓手寫新詩此時興已綽一揮敵萬夫再掃妒佳魄回首夜如何搏桑紅日爍過楞伽石贈輝然靜主偶然獨上楞伽石百丈枯藤飛鳥跡遠望高天不見煙到門列坐逃禪客巉巖迥絶羅三川岌孤危虛四壁澗曲凄凄白水縣雲飄自是紅塵隔勉玉林體賢二居士立身宜看古之白句巧須看古之甫平生真率人皆欽草堂夔州如故土幾許清韻又相同兩公高名人所取此道坦平皆可行從來自是李與杜和李玉林杜體賢二公贈從聞大師原韻結得茆房聚名賢燒豬沽酒仍相牽三生石上歌不足又向前溪踏春煙此是無為真自聖亦又隨緣別一天高吟豈作尋常事搔首裴回同輞川送象翁耿路南路南使君臺上霜風清畫棟龔與黃又看瑞雉羊城日東過蒼梧去夜郎萬里相攜惟一鶴百錢挂處是行裝若到南越飽薏苡可將一斗寄上方贈二嶽昆仲北歸春夜東山設筵席酒酣作賦紀行役北歸獨有詩畫船暫還隴畝林下奕今夜且盡杯中酒明日楚關復何有翱翔秦川夢裏山若到咸陽先種柳悼祁總戎諱三升訓練之餘喜逃禪羽扇幅巾得自然已似瀾滄滄波月更勝楊李口中次肅清南服韋皋績掃蕩妖氛諸葛蠲緑柳凄風來洞壑紅桃血語響春鵑蕭森若木夜殭立寒瑟邊月徒空縣江上雲峰懷玉斧邊城鐵柱誰為樹異牟賓服沙磧寒梁益祇今無將主次護法毅淑楊公見贈原韻梁園春色來十里多有名賢論至理心清虛無蝶夢閒神遊秋水南冥裏高人獨處號牧雲口誦清淨久超群自是英豪能如此不是尋常洗垢氛丹房早晚服大藥無事隨雲騎一鶴紫府仙宮任遨遊蓮社詩壇亦有約龔北泉劉粹吾轉藏經十二藏歌以贈之夏夜月生殿閣上經聲落處華雨揚檻外流鶯來啾啾窺簾乳燕兩相向雲南有客神清奇蕭灑風流難測量不逐浮名惟道親邀人閣中翻龍藏如來字字無他詞一畫一畫真實相玉軸有時用不著金經一取返魔障偶然作此詩一篇逸興宛轉歌喉亮此情寄語兩徵君聞之能無消惆悵廣通疲馬入荒城登樓喜晚晴霜飄望子洞風急武侯營倦夜宜先臥防邊欲早更來朝前路遠數聽曉鐘聲宿鹿城柬馮太守諱蘇寄宿苴橋北鐘傳野寺東垂楊太史樹遺廟武侯宮月皎溪光白人寒市火紅欲瞑興未盡還聽響山鐘至日壽何檀越昜回蘭谷暖佳氣結山墀瑞雪堪圖畫流霞可奉卮霜黃園橘淨影赤縣弧垂此日山林叟題篇贈紫芝賓川報國寺行行入古寺亭上樹新碑篆額丹砂在題名翰墨垂鳥飛遊子意詩紀去公祠勝概如能寫長思杜拾遺示木邦土舍衎合木邦荒服外兩耀豈不同黃金呼為衎水樁亦稱虹字畫半丘蚓象乘險必通來問西來意一掌理可窮九日秋老梁山碧攜壺今欲趨隄楊疏尚翠園橘冷還腴洗盞松風徑倚雲洞壑殊華峰開夕照處處醉茱萸喜雪可維那月可後堂二子呈偈遂贈泉石居來久煙霞秋亦深登堂談四相翦燭論三心瓶瀉淨因辨河縣覺範襟素秋當白日入定在嵩岑和張青崖兄遊古庭值雨過歸化茶房小坐原韻未至遭風雨古庭時尚秋香消苔畫壁殿冷日鳴鳩小坐烹茶室歸看放釣舟疏林正落葉野徑轉深幽次從聞兄遊古庭原韻無事尋山好孤卬訪舊遊溪光生野興雲色含清幽雁陳湖山冷蟬吟草木秋霅溪今有韻新句在樓頭中秋贈蒼波嵐波還雞足結束腰包久歸心落日邊金川翔去鶴劍嶺拂晴煙半壁丹楓外孤雲碧岫前頭陀蘚石上歸去任高瞑過胡公怡齊太華開曉霧北去到怡齊入戶聞琴瑟登庭步玉階香馞茶華盛瑞雀石蘭喈滿苑生秋色清言可暢懷送張旦平居士還里張子思歸日昆明正晚秋霜鴻辭北陸雪騎別西樓明日夜郎遠歸帆涂路修烏傷終必到書信寄來不昆明道中筍輿未曉發嵩阿殘月依稀在女蘿赤甲村煙連曙角白眉溪樹入晴坡幾家茆店雞聲雜百尺板橋野色多溼盡鶉衣華頂露回看昆水冷漁蓑宿安寧州十年兩次過安寧一衲天涯歎野萍古蹟荒來迷賈島溫池望去得鳧汀虎丘遠水流明月蕭寺疏鐘落曉星旅客牢騷爭去路孤城回首霧冥冥祿豐一杖隨雲過祿豐城橋有寺鎖龍宮煙嵐北去丹崖遠晚翠東來碧岫通諸葛遺蹤荒草裏韋皋墨蹟劫灰中愁看義冢碑橫野一水寒流送夕風旅舍用壁韻杖底風生得自由行經鳥道雨初收穿林野蔭愁山路過澗晴開見石樓塞外郵亭遺舊蹟山前客舍俯清流我來倚杖青天上遙望點蒼雪滿頭早發金蟬寺月落金蟬別楚雄關山盡入曉煙中樓然戍火燒溪雨閣動疏鐘繞樹風二水同流搖地軸三星并落收漁筒何人作賦懷仙子墨跡猶傳在寺東沙橋古寺同從聞大師題壁把手煙村舊寺遊烹茶又向白雲樓佛龕石墮香貍穴僧榻雲封竹鼠留斷碣深埋豐草裏雕梁半卸垝垣頭如今寂莫無煙火獨有秋風白杜洲再過龍華寺龍華今日又重過為欲尋幽向緑蘿近夜鐘聲迎莫雪臨溪華氣逐樵歌參差碧樹環煙淡向背青峰映月多寫境無過人境外不須惆悵對明河洱水贈祁鎮臺松杉萬樹列蒼巒洱水迢遙下雪灘三寸交梨霜夜赤一拳火棗雪時丹牙旗令肅將軍帳鳳詔泥封玉帝翰不棄梁城當日事何妨煮茗對嚴寒洱海城西來信宿入邊城此夜嚴寒雪未晴石倚丹崖雙鳳舞雲封碧岫一鳩鳴寒光遠映松千嶂野色從容月半汀磬接感通秣馬地遍遊南徼臥龍營賓居道中寄督府衛公浮梁曳練冷溪濱古木搖煙蕩野蘋雪色如銀隨遠近笳聲帶冷動嶙峋黃柑樹樹三冬熟碧瓦粼粼四野新昨日肩輿來若水孤城又得聽經綸晚遊賓陽小西湖贈衛使君孤峰獨立字飛來小坐西湖晚興催好事幽人同感賦無情野客共銜杯接天塔樣如天竺覆地華陰看雪梅更欲湖山都拾去回頭早愧子瞻才贈石鐘松波已著聲名洱水東蒲團靜對畫圖中青山自重荷衣客白社還欽惠遠風松頂泉聲飛玉液雲間秀色度霜鴻我來共話平生事笑看棲烏雪嶺東雪霽贈石鐘印文禪師條條赤石字芙容百尺高寒樹石鐘霧霽寒猿方出嘯晴開牧豎遠相從茶瓜延坐嵩陽客亭榭低佪水檻松無事與公談此夕野梩且架送殘冬雪霽登天柱峰有感捫蘿雪霽上高岑一柱摩蒼差可尋華首晴開當曉日袈裟石淨論傳心天高無際真寥廓地僻長寒送夕陰自愧攜瓢來聖蹟振衣千仞望西林宿迦葉殿雪頂寒深繞薜蘿今朝一上晚晴多雲拖石壁生新霽霧鎖飛巖可避戈夜聽霜鐘天上落松移山月榻邊過此時已與風塵遠何必愁來問覬歌念佛堂贈近微白髮堂開雪嶺阿朝朝飯罷入禪那磬鳴鴉鳥生臺立日上寒猿野樹多水汲靈湫分玉液廚炊雲子割秋禾閒來把盞僧囪上坐看松濤落鳥窠答蒼波得到青山興轉賒高人相踵論拈華東林散步看纖月北院分題詠曉霞勝事偏能馮野鶴間情獨是在僧家朝朝共坐千崖裏庭際猶宜詠雪華答文郁見說名山第一居清池歲歲長芙渠斷崖不見孫思邈絶壑還逢支遁廬石刻既傳韓柳賦僧房尚挂宋元書嶺頭不斷啼猿狖客恨難教得自如登近雲樓有懷雪晴一上近雲樓西望平原已盡秋橋鎖金沙黃石磧山開玉壘赤松丘千巢野鶴棲琪樹十里寒梅綻玉溝粉壁題詩名姓在獨教雨淚付東流己酉秋巨唯禪師見贈弘覺老人並遠菴和尚語録詩以致謝海嶽迢遙落葉天移來慧照看雙縣輝光浩浩高蒼月甘雨微微太白禪直使狼狐迷影跡還教虎兕失巖泉梁州從此開津濟一片和風散楚滇答大賢閒攜竹杖上崔嵬懷抱欣逢此日開雪霽金沙流若水山連鍊洞到層臺長松萬尺盤根大野鶴千巢古寺隈此地雲深宜放浪何妨密密杖藜來大覺寺觀姜御史遺跡驄馬西來隱翠峰題詩滿壁在長松刈茆溪上逢禪客養鶴庭前去毒龍月煮沙鐺新瀑水飯炊雲子隔宵舂如今鐵骨歸何地倚石沈吟念昔容早過華嚴寺望羅漢壁日照山門古徑松清晨扶竹覺躘蹱坐觀削壁連深壑俯聽高樓遞梵鐘溪色陰晴寒氣迫瀑聲斷續練光重青苔踏遍尋歸路又向僧僚展笑容題傅衣寺松贈虛中古徑婆娑緑影斜風來日日掃苔華枝橫澗水千年浪葉蔭名山百步沙青靄時看僧入定蒼芒猶見鶴穿霞虛聲何用留江漢不及頭陀一笑奢復片雲居寒盡空山檻可憑隴梅又見映崚嶒山中緇服存詩道雲外高人念祖鐙落日漁樵辭洞壑方春猿鳥近禪僧如何祖印傳今昔未見芳名繼老能贈大悲閣清宇刈草依山築隱居丹霞作壁石為除賓川已謝徵僧召古寺還辭侍御書漫步輕陰松月滿閒吟薄莫水雲虛才名不落天人耳時傍溪南擷野蔬贈石鐘德周一錫南來到石鐘情同瘦鶴日棲松閒縫壞衲依暘谷笑倚清軒看翠峰不說苦空心自適時焚柏子客相從年逾真際休行腳只傍溪山學老農同印文看梅日暖相攜步草萊臨溪小鳥向人哀每逢雲外流香遠卻看山邊細蕊開散盡輕陰仙露潤今知貴種月宮來為貪幽韻情何切不怕夕陽在緑苔暇日居山已謂得翛然誰料身心返被煎圃上土雞常啄菜溪邊水鳥汙新泉風吹雲壑崖花折鹿過山坡草色捐更有一般全沒趣逢人只見是非牽晚望赤石崖奇峰丹壁巧難圖十里松杉逼鏡湖薄莫晴霞籠遠岫扶疏倒影下荒蕪深林不覺鐘聲暗水淺還期月色孤此外紅塵飛不到徐行始得自瞿瞿同密化晚登鉢盂峰答繼聖禪者行來石谷采幽蘭過盡煙霞露未乾倚杖盂峰啼鳥遍依巖流水瀑華寒雲開斷壑山千傾月照深沙水一灘回首不堪霜夜坐渾身寒色覺衣單慧建菴同毅淑楊公子固居士賦得梅字曉行清趣遠山開又到名園看早梅蕊綴晴霞春正好香連曉雪玉方回雕闌憑去閒敲韻苦茗烹來且洗杯賦罷瑤篇俱上馬明朝有約又重來又和毅淑楊公看梅原韻諱彥浣南天未雪已多梅不似江城笛裏來韻就新篇茶正熟香飄細蕊雁初回當年蠟屐遊難到此日柴門鎖更開不是撚須成五字文光早已奪高魁次怡齊看梅原韻鍊就鐵衣喜種梅梁城東上草堂開白沙隄擁連雲綻青草橋通帶雪來幽徑風微香細細晴窗日暖粉皚皚誰知貴種人間少卻向名園日幾回薜蘿居值玉林居士寫畫索句煙霞深處結茆堂庭柏森森傲早霜好鳥窺人情自得閒僧著論理俱長正逢裁紙圖山水卻聽歸禽下夕昜此境何妨看到夜明朝更欲到雲岡答參智禪者檀山青靄葉榆邊萬樹寒猿叫曉煙濟上一宗歸錦里黔中半鉢老南禪鐙明丈室談心夜道接長松近楚天自古英才梁益勝名聲總不別林泉答智足禪者自理綸竿坐釣臺金鱗未躍白波開長歌幾曲思船子清韻一聯屬辨才釣上生擒看自俊橈邊活捉信凡胎也知華首多燒尾故向波頭日幾回和劉太史五月賞菊原韻公招此月看幽香節候天中玉艷芳暑裏傍階五十朵經秋笑日兩三行逸群不問梟羹賜送酒還思陶令長賞罷夕昜低在樹又攜竹杖去茆堂又和九月賞梅華原韻祗說天香九月開何知雪骨小春來從今石徑堪為友不向昜臺定作魁憶昔高峰曾落帽相將踏月又銜杯此間自是無塵俗卻把荷衣細翦裁又和六月賞海棠洗盞梁園對海棠濃香露溼近秋光湯休此日耽佳句蘇子當時詠曉莊最好全看金帶美含嬌不借玉盤良長知太史詩偏達吟作明河一片霜又和池心石山煙消始見立香瀾載酒來過不猒看袍笏拜時終姓米絲綸釣處定名磻秋深待月常貪韻夜冷添衣宜壯觀多少遊人詞賦罷不須更論鵔鸃冠送張旦平還浙中離亭酒罷又從東折柳長橋興未終山路有程隨瘴日扁舟無恙挂秋風霜楓遙憶吳江勝蘆荻相看秀水同話及汪倫情更切天涯分手笑談中中秋後一日同文季公嵩山對月天香幾樹野人家此夜烹茶望太華莫道金波前日別須知玉浪此宵奢凄清最是秋梧葉嫵媚無非上苑華見說峨嵋峰頂外看來別是一天涯讀石門程昆明詩集一代文章近在滇風流神宰益堪傳才高漢使鳴金馬力勝唐人詠玉篇不放夔州稱獨步還輕供奉拂雙箋煙華已滿奚囊日更鈔南華秋水篇和而足許公登雞足偶成原韻諱學夔探奇得得入雲來粉壁留題鬼亦哀石上素琴松入韻華間秋月影沈杯蕭條籬徑迎春柳斷續溪煙破雪梅愧我無才用事拙揮豪依舊病魔催又和過聖峰寺擬登絶頂不果原韻乘興翻然上苑遊迢遙野望衆峰幽崖飛欲墮蒼雲石水落還驚白雪流得意長多方外士怡情不乏掌中甌從來此地標題甚寫遍青山百尺樓又和宿大覺寺原韻公時赴宗人府經歷看盡雲山是幾年尋幽長在白華邊參差松竹如稽嶺起伏巖廊似輞川倚柱敲詩秋夜月卷簾對菊午時煙公車北上京華日折柳橋頭廠盛筵春王小坐傳衣寺茶華下山茶一樹散春期靜對庭香雪老時獨有清芬如上苑絶無嬌氣似辛夷巖蜂莫逐華須嫩草蝶長隨粉瓣窺不為興酣人便去判教夕照在東籬送三山陳刺史還里北上公車數十程明朝天末即孤征夜郎山色愁中過渝水煙光靜裏明白兔亭邊青嶂月黃牛峽上紫猿聲不知別後遭何日相對山房欲二更補遺登高倚杖千峰側裴回嶽色孤霜催杞菊老風妒石苔臞白水流深淺青霞看有無回頭尋去路落日倒荒蕪溫泉此泉流不歇濯濯蒼丘月月色深淺來上下照玉闕沉屙滌何良滑潤如香馞泄泄日三潮靈物宅幽窟贈小壺橋戎臺夏公軍威百蠻靜昆海駐雕鞍弦動邊庭月弓懸老將壇勤王心耀日題柱篆飛鸞肅殺才方歇休言歸挂冠臘八日雪邊地寒膠合橫窗映玉林天花散石砌山谷凍珍禽碎翦鵝毛淺屑飛洞壑深漫言梅信早邀爻過幽岑雜詩昆明池似鏡微白月初來官渡漁鐙遠晉陽客夢催蕭森孤樹肅寂莫片帆回借問梁城寺柴門可暫開贈別思園余明府握手嵩陽日論交如弟昆風流高北海著作邁南軒己固歸心切徒勞借寇喧五華分別處去住兩難言九日過衛府新創梵剎贈尼性空村村黃葉飛況復直重九我行南國西梵剎砌瓊玖金純亦界道高閣背北斗能仁趺青蓮大士遙垂手已勝獨孤園末山道頗厚將軍每參隨侍從皆蘭友咳唾西來意屈信鐵磨肘此是上上機爾今斷疑否宿金閣寺示得實劉居士偶來金閣宿茶花樹樹紅泉響龍窟近林深月影同愁時傾竹葉夢後憶蠶叢回首雞聲碎清鐘杳靄中壽弼臺張戎府五嶽高峨百川浚流福兮壽兮可以匹儔公之功宜勒鐘鼎公之德陰佐王侯是故合十祝公之壽與福於萬斯秋壽玄初劉居士須彌不足喻河嶽豈堪倫壽等虛空界此事不須論嵩山更有一般祝大道之人何秋春己酉菊月有居士吳井東鉏地得雲板一以送余余灑滌之見上有小偈并署大元至正八年萬福山報國禪寺僧某鑄詢之故舊言今白塔街即報國山門坐東面西洪武初移建別地今歸化即報國所移殿閣耳遂作偈以識其事偈曰大元招提物遺未四百年雖藏糞壤中終須無棄捐感爾一朝出使余淚泫然浮生豈一夢世事如轉圜白首看人忙日日苦相煎若云各有適不知總幻緣譬如報國寺今移歸化間誰是長年者無乃寄嵩山禱雨炎方草木死為薪見說今年是旱辰罪己回天宜此月開倉賑粟可蘇民隨車即有仁王澤起稼還歸嶽廟神感德元元泥首切家家齊際太平春禳霖獨是秋來雨色重梁城日夜水淙淙芳園未論海棠苦田舍偏傷禾稼凶當事蘇民情更切名藩憂國意還濃西郊禱後陰霾舉一色青空挂日容次月下看梨花原韻春色溶溶上苑花植根應得近官家餘情幸不霑塵俗高潔偏能淨晚霞映石只愁香冷落臨風學舞影橫斜月明素練如何辨一片清芬鬥麗華夜泛昆池閒來小艇泛滄浪夜泊芳洲杜若香漁火近人三百尺楓楸隔渚十千章停橈靜聽魴魚出洗盞遙看蝙蝙翔情切祇今秋水月興闌猶在衲衣旁再泛明河泛泛迎秋月華嶺飛飛出岫雲望去蒼池開素練行來白荻動清氛競龍渡口鐙如晝畫鷁船間醉正醺愛此佳遊不易得洞簫多在鏡中聞贈擎天胡公每望清華一色秋飄飄桂氣上書樓窗紗彩畫雲霞活詞賦新奇李杜儔愛客偏能忘勢分談兵不必貴封侯梁園孔雀屏開日早見乘風作上遊再過金閣寺示晏然朱居士再過龍宮動法雷天花霑處淨氛埃劈巢飛白新黏壁裁紙臨池作賦才宗說通融忘理事生緣盡淨好裴回信知金粟前身是只任狂歌酒一杯寄銅仁東山端居和尚草堂東山陽崔嵬摩高蒼下瞰銅巖水春流浪花香歲歲結珍果同根夜郎鄉正有南歸雁無書祇自傷教人眠不得徒斷幾回腸示蒼雨書記六合春蒼翠三川響怒濤此時天正好尋幽興益豪出雲峰如削墜壁石似刀歸來嵩寺裏孤琴為爾操贈育之張公北上公車今北上明日下夜郎馬首關河遠征塗草木香春深荊國渡酒醉楚人航若到燕然日題詩寄故鄉壽高太夫人劉覺證庭下芝蘭秀冠蓋舊聲名伯仲英雄并提兵各專城黃鶴今來下玄冠映高旌林下如何祝上壽過錢彭朗耀禪師塔銘知幻即離始悟本末早剃須髮惟勤以學負笈南北融師磨琢瀝膽傾肝大夢斯覺聲輪宣明雷震雞足黑白相從囊錐始出象教嚴設可侔身毒法幢既摧叢席淡泊瓜瓞聯芳有人繼續我寫銘詩刻此貞石雷宗遠為百歲婆祖夢乞偈刻石攃手便歸去此事復如何一事無貪著勞生脫愛河秋風吹霜出月色滿藤蘿滄海常變幻焉似百歲婆一朝辭親爻努力到坡陀故余作長句刻之在雲窩宗派偈福宗妙果慧海心佛法洪祖道德溥鐙傳廣承真印化永維緣濬源普潤芳顯覺天板存嘉興楞嚴寺經坊
