body:
  text: 潭州門人宗廣編書問復江川令張公耕煙居士梁城近年來往往得江川人到省會稱道江川公之清政和平前此未聞有如此良父母也而且頌聲盈衢中外不絕不識江川公何修得此美譽如此之隆也雖未識面常竊慕久矣月日有呂某者來自吳門得一書乃平江江村和尚所寄啟讀之方知江川公從先師翁法窟中來真一代揚李也江村有字寄公署已托之從聞禪師不意從聞往臨安所以不及齎投非敢疏慢自取罪戾也又接旦平居士一書轉增慚媿今又讀所示並佳什字字公美言言天覺可書座右以砭鄙吝真良劑也慧往來梁益間十四年於茲矣絕無一人可語者一旦獲聞所未聞豈非頭上公所賜邪嵩山荒剎得公之來泉石生光自此始也此又非我先師翁冥庇何能臻此慧常揣之俱乘願力而來不然誰肯忘位貌下交於山野之夫也所以江川黎元獲福南徼草木感化德冠六詔仁及百蠻使森羅頓然起色者此也慧雖識淺學疏非悅老之明敏然何懼不能答一百問頭也儗即晉謁奈土木之工未竣聊肅荒函代訊起居稍得餘閒方謀接色笑臨楮不勝神溯復雞山石鐘慧融主人自到昆海便有曳杖雞足彈指出定裏頭陀把手論拈花意旨實非怯螳臂而不能當金根之車輪也不意諸方削牘同人交章爭先下邀直使報命之不暇故十四五年來蘊一座祖山在胸中至今尚未了此一案也忽忽子規在樹石鼠出穴時當春去夏來得接瑤章金玉作聲珍貝交錯自念下里庸才巴渝陋質多慚過譽感激猶深奈何法社初成難以應命特修寸楮用復高雅外具俚語別申鄙意俟秋月當天促織驚婦或策杖而來對點蒼山接談笑向華首門候頭陀然後次第與諸耆舊作十日談公以為何如率復不次復平江法華澧伯和尚環天下而叢席者自古稱江淛為禪藪辨才智囊代不乏人況吾祖父發跡之地邪所以能剖佛祖行說不到處實惟有此英哲至於今日為能深窮此學使衲子有所矜式者又在我天童老祖與我先師翁五十年苦心也暨二老人唱滅又得吾江村法伯和尚復振起江左不墜先人宗社此實吾門幸甚聞吾師自廣陵復轉雙塔再與和尚往復笑聚想拍拍是令而二毒鼓聲邊聞而死者又不知幾人也慧獨處寡聞之地加之僰蠻為伍侏儒接話故此言論鄙拙實媿古人奈何及門者竊錄妄付梓氏敢當不枝詞蔓說以嘉惠後學之譽亦可以并駕當今獅馭也邪皆和尚過美神駿以光下乘耳慧自揣才學俱劣且遠在炎方慮唐突法門罪在不宥倘和尚常頒清誨則慧受賜多矣屢欲自滇黔達楚由楚入吳越買舟過臨安登徑山拜埽後再向四明上太白密祖塔頭燒香上供然後晉謁和尚縱觀法席一洗茅塞其如歷年多土木之勤應接之繁所以不能完此公幹是慧終不了之局也江川公雖未謀面然神交久矣今得親接談笑皆和尚遙為噓植使慧有可語者又皆和尚所賜也梁益法運其所異同與江淛細大矛盾其間皆不能去寸而主法者更難於蜀道百倍一陰應候萬物資成望吳雲而迢遞對榴火以裁緘媿乏一芹伏惟原宥不備復鶴慶眾居士八月朔同二三子談笑鵠齋窗下忽典客報鶴慶書來啟函捧閱見眾居士慮我會省水患兩月兩泛雖無鱉民之苦泣珠之恨而昜候之虐人未免啼饑號寒尪然載道矣嵩山一坐具地賴祖宗之靈殿閣無恙僧眾稍安獨是垝垣數處勞人遮塞而已多煩眾居士深慮遠懷實見師弟之誼非多生夙植不能臻此感佩之私又非筆舌可盡也秋冬之交登雞足後握手鶴慶可在指日間也水歸大海波濤雖靜雲到蒼梧氣象未必閒也可與至者道公等以為何如與劉太史諱茝自號火居和尚石壁揖別涉螳川登煉象不勝崎嶇勞人也渴想清誨無翼能飛時對老松古澗怪石奇峰何啻在昆明與火居和尚之夜話坐樹義坊之談楞嚴邪及抵威楚小坐垂柳之下微諷所賜佳什又覺神清氣爽不止百倍也太守馮公不以居方面之尊下交山野之夫可謂今之濟川則知外護吾宗佛日永賴矣塗中裁寄不莊其嵩山常住恃在匡扶為感寄省中眾護法檀越十月七日自省城早發沿路見山山水水及煙村茅店遠壑頹峰儼若把握清談真不異梁城時也瞬息冬至矣朔日大雪僕夫勞頓心甚不悅及到雞足自亦疲倦也初六日上山頂燒香竟即欲旋杖歸昆明奈何諸郡護法與諸山知山僧意胥來勉留因此不能脫灑矣思念不置裁此專候眾護法想福祉清和與新禧駢集又非山野管城饒舌能悉佳況矣嵩山常住伏惟弘護使往來衲子得飽柴水不獨黃面老人稱讚亦使山野夢寐無驚矣至於令法久住又皆護法多生願力歷劫聞熏所以有此一段真誠不昧可謂現將軍身宰官身長者身居士身得度者即現此身而為說法而為外護實均不負靈山之囑也山野庸鄙得隨處抑揚宗旨或得一箇半箇報佛祖莫大之恩則山野慶幸眾護法慶幸寄楚雄參戎李檀越鹿城握手旅舍談心差勝昆明十分快暢此路逢劍客呈劍之時琴遇知音好彈之候何殊毘邪離談不二之日也兼之掌上香廚室中機辨知門下單刀直入真破萬人敵一血性漢也非乘願力不能及此且令魔子妖狐聞者膽碎頓顯授受之人得行此道豈同傳遞源流寄一信拂便竊道器者同日而語也前到雞山雪不十尺不已過三四日始晴眺望諸勝真如觀掌上事訖將旋緣山中禪德胥留結冬未獲載行李東歸耳鴻便肅此草函恭候台祉不備寄賓川衛使君客寓報國承枉顧直使桑門生色兼飽之以德山野敢不銘五內邪山中勤舊無不合十稱於左右前登絕頂兩日便回石鐘竟欲再謁苦為諸剎勉留本月二十五日已結禪期矣山野不揣材櫟識庸大辱風化徒恃高明作外護不識得保全始終不也倘不忘付屬之心使慧日長明俾迦葉老人與蒼山洱水並耀則山野慶幸諸剎慶幸亦千古一遇也春暖風和萬花吐蕊時旋杖侯門復聆清訓指日可待也臨池不勝神馳寄何護法挂笠賓川得枉駕報國極為希有之遇兼助信施飽我雲水稱謝何既轉眄閒三昜既泰萬卉甲坼矣冰雪皎而梅芳花雨潤而節至惟居士壽域同昜和並增道祉齊物色共暉雖藉毛穎多多和和拂劫石數芥城亦不能較量萬一也山野寧不羨哉不能躬祝者盍緣諸山勉留石鐘不獲如意薄具鄙聯用表寸心侍在汪度或不擿地答洱海眾護法到山日雪幾丈矣暨晴明遊覽諸剎雲樓紺殿儼然別一世界然一生看不足之境況五七日可能盡哉不過粗得其概耳待結制石鐘後與諸禪坐論山巖怪石雪嶂松灣與古今興廢並洗閱碑碣始知石鐘乃天寶開元閒尉遲公至葉榆之所建也有僧賓昜來將眾護法書展讀之荷蒙遠慰使山野汗甲彌增矣前過貴鎮深飫天廚每欲修候以初到此山人事未閒所以缺典實非疏慢也且山林道阻苦於郵便僧返貴地聊肅荒函恭惟新禧與百卉競妍道祉同三昜爭耀是慶是賀寄彭護法省會別來雲山野店坐賈行商朝雨暮雪鴉樹猿藤無不目睹耳聞及到山中與沿途不異豈不雲月同然也聞檀越駕來賓川幾欲躬候緣石鐘結制未能別眾出山徒抱此心耳便鴻裁候台禧待新春時花放高枝昜回暖谷山野必策杖金牛而百夫長肯將公署前十尺地使山野一吐別況不寄宗人府經歷而足許居士初晤雲昜即如舊識別來使人懷想無已古人謂渭樹江雲之思此真境也其後護法鶯遷來昆明抑揚祖道藩塹宗猷山野粗安無魔外之撓此皆護法多生願力從果位中來不然何以能如是也客獵威楚擬謁燕居適駕往金齒無緣會面抱歉良深到雞足遊大覺睹滿壁滄洲並佳什俾人神清氣爽忻賞不已援豪奉和錄寄左右不審郢削何如時聞護法升轉宗人還京都山野不勝慶快想倚青雲捧白日躋蒼生於春臺自此始矣山野不獲道左奉餞遙肅素函土物六種伏惟筦納不備答衛府祖護阿哥自昆明來沿途無他喜獨是喬松古木山秀水明怡然滿目既已忘勞不十五六日即至賓川矣承州牧款渥甚隆皆阿哥遠庇也及到山中儗即修候奈閒關修阻且長實非疏慢自取過咎也忽辱佳章注意山野不勝舞蹈水邊林下全章祖道使無文印遇性慥漢兩手付之實外護之功阿哥真法門之金湯也寄會城眾護法條風遍野瑞草將舒梅雪爭奇昜和溢目眾護法履羲軒盛世樂聖代笙歌萬方頌昇平之大有百郡嬉華屋之長春山野亦遙祝新禧遠瞻佳兆天人俱泰燈月齊輝奈何主席石鐘不能解脫既無由縮地豈獲躬親惟藉管兄托楮君寄候俟旋昆池又得把握為快寄祁鎮臺山青水綠是普賢文殊石怪峰奇是目連鶖子居士蹋毘盧頂𩕳寧不知是邪所以逢場作戲遇理即融舒雪嶺之相好演金沙之長舌吐玄機臨宦海豈非風行草偃水到渠成者也昜回百谷春控千條道祉福祉雙彰世諦真諦齊顯此又居士多處添些子矣山野擬登轅門一候新禧奈何期會未竟不能自由偶得鴻便問訊起居俟杖旋當謀面作三日談不備寄洱海眾護法洱城聆清誨得十日歡思方外樂於此為盛矣別來山中雨雪漫漫人事匆匆不及修候且聞大師指麗水矣轉眄閒不覺斗柄旋寅昜和應律萬物甲坼五花送溫眾護法福共春增道齊羲泰山野亦瞻雪山秀靄對若水潺湲借光為遊戲之樂也無由通候懷想益深忽得普上座之便特肅寸言伏惟慧照幸甚答劉粹吾並眾居士一瞬數月真如過隙白駒回思客歲還似昨日寒暑窘人有如是也新正又五日矣遠承華翰眷注實深非相知不及此耳到山來寂寞冰雪中雖道人本分然回首昆明則又霄壤矣諸山胥留勤勤懇懇既開爐結冬是不能速返俟期竟自合歸來將遊覽細大境致細說與二公使不遊而當臥遊也昜回律轉節泰時康惟眾公道況新禧與物華並秀山野自不多贅嵩山常住乞百為鎮定尚容面謝不既答饒玉章居士山中無曆寒盡不知那復如此地尋聲逐臭者往來萬千真山林城市絕不減一絲豪也承注念山野赫蹄遠錫非玉公故人不及此也萬物回春千燈徹夜道況清和新禧衍泰不待山野托毛楮兩公一問嘉致也命覓杜鵑山野訪之山中近來諸剎荒蕪此物絕種即花草之娛亦非昔所有也率復不備與鶴慶眾居士雪山蒼山并峙天柱石寶爭長一一領略得可謂會盡無情說法矣論義的論義機鋒的機鋒眾居士以為何如承注念之勤信施遠及直作雲水伊蒲開闢人天茅塞所以山野陞座發揮宗猷實為南服希有事也山野雖遠在山林而人事尚亦紛雜不及常時裁寄想亦可推諒也率復不莊與嵩山諸子自離嵩山陸路中穿林入箐崎嶇不能言狀真謂庲降賈子左擔七里矣苦輿夫之力心甚不安況鳥雀幻怪瘴煙撲人望荒甸牧郊依水樹雲窩或登巖關度雪嶺或望聚落入旅館此與賈客射利者何異雖欲求三里亭五里寺安可得哉此唐宋諸老行道不至之地也今時頗多總之今之妄稱授受之系以污祖佛之堂者比比皆是亦難細言也古謂啞芊僧封狐野干之屬又謂鳥鼠僧鼠竊狗偷之徒嗟嗟法久生弊教壞人家男女信心居士聞此魔風不退息者幾希即使釋迦再生達麼重至亦難挽回是輩矣所以老僧抵楚雄宿苴橋問升菴舊蹟故老亦不能言矣公去未遠即乃若斯矧先佛去世真風難挽故爾古剎新院窅無模範令人感傷不已爾等確守規矩是真報佛恩不然無益可卜復洱海衛總戎自晤對梁益來一紀餘矣弘護祖道眷注雲水惟護法枉顧之勤藩塹之固前不讓邪舍後不遜楊李直使風旛無恙真千古一遇也護法以貴客榮陞元戎梁州鎖鑰南方干城不以山野無似之夫羽翰頻來俾雲嶺荒院生色侈矣既翹首行旌曷勝縣切與蒼舌知客遠弟姓楊名國泰十餘年雖專人省師頗勤終未能釋我懷抱而鬱結五內非一日也前二月花朝已束裝躬往藩下護法不肯放行故又弗如所願也議專某某皆遯去使我慚赧亦難再議人也遠監院在傍見我昏悶遂舉爾蒼舌老成諳練誠可以行矣然遠以為萬里閒關何以為助乃用胞弟佐往是以星夜走人上楚雄說其弟馳郵而至會省則爾蒼舌已先馳也今星驅尾其後可以無憂況此人滇之崇佛而尚義者爾蒼舌自合無虞矣與報國雲夢願孫師資道合行解相應驅霹靂走閃電已不可枚舉矣寧非父子一堂紀綱千古哉所以能發先人未兆之機規後學已墜之弊惟在住持之人振宗豎綱耳昨省來書並秉拂法語知爾為報國主人益重吾憂何也學道難守道難而行道猶難如領眾有常暗室無媿然後握金剛王是聖揮聖是凡揮凡宗說亦剷真俗亦剷可謂鎔瓶盆釵釧作一金攪酥酪醍醐為一味豈不光大吾宗梢慰斫額邪上蘇州三際寺磚老和尚久違侍奉哀慕日深非敢以間關修阻裹足不前奈嵩山院子無一能代守者遂致隔別不能一見面真良苦也去年修啟與香金又未上達轉增寸結比時必欲南來不料雞山敦請要慧主法石鐘再四不能已只得勉應而趨庭之日是又不能如心矣今春拜讀教訓知吾師養子之緣尚不絕於慧也二月至省會張護法歸又得瑤函不惟不切責疏慢之過返又獎譽如此慧何修得吾師愛念不少替真和熊舐犢之恩終身難忘也滇中光景不似從前雖住此一席實難高枕想吾師自是深知不待入告自然推亮也又八月二十六日王府差官帶家啟及銀物想已到矣不知吾師近體安逸何如慧不得走萬里奉覲總之院子所羇不得一時擺脫故也滇中法道慧頗不有玷然非慧自陳其好難逃往來人口也大端來夏必著人來梓雞足之稿並再住嵩山餘稿此非慧意實出佛源張護法美事想吾師念慧愚惷自是印可倘能與前所梓者不背乞吾師斥付梓人若得工完帶數十本與滇人結般若緣不識吾師以為何如敢候進止又今年二月朔慧謝事嵩山以兜率壑長老主院事即日裹束衣囊欲歸省覲藩下眾居士相留且堅即欲逃來而嵩山新主人未必即擔得下深夜籌之行止良難加之江川張護法亦來阻留故江川公有書報吾師實欲達慧之心事也但久違函丈罪過日深知吾師深念慧愚想亦原之矣沅江王護法浪聞遷蜀不知果否若有機會必請吾師回川慧始放心也近日人情太澆浮益不似前日也且杖拂盈衢惡態不堪言良可痛也當此之時只宜煙霞洞裏風雨林中煮沙鐺過日一切不較為愈也餘不備陳與文遠監院自到雞山勞苦甚矣且又人事匆冗無一時可靜回思嵩山如在異域即欲問歸期尚不能說起山中雨雪彌旬寒威不能少遏幸榾拙火猶堪朝莫耳汝在嵩山看守凡事宜小心內外大眾有不如意事汝宜調和使之平妥不可尚性情性情一尚便有許多不如法事此山僧深以為憂大都來歲或得謝事即議行李便是歸期檀越如有問山僧可將此意達之座元與序上諸人皆不及有字來由不得半晌之閒故也即將此字共目可也餘不多囑與兜率不磷堅長老山中雨雪連旬不斷苦人甚矣即沿途勞苦亦難備敘想吾徒自是高枕兜率不勞山僧遠慮也此時法運方轉豈意偷名竊位之夫往往壞事使大信檀越見此不能無疑所以山僧憂之非一日也即吾徒亦備常聞山僧之緒論久矣大端邪不勝正此輩自當息滅昨已見數處早成敗類是吾法門尚有幸耳兜率既有錢穀可安大眾是吾徒行道之幸事不可以為勞苦俟歸嵩山時又得與吾徒說家常閒事餘不多囑與銅仁端居嵩石兩和尚聞兩法兄在銅仁大震法化使長松法燈永照滇黔矣但弟兄十餘年不一面未免渴塵生幾十斛也近日老和尚在吳不知常有信息往來否弟不能一到江南奉覲顏色弟惟罪是恐有日矣如兩法兄遣人問候當代弟一字以達弟意為感前端兄錫教弟已如命奉上不識到否如鴻便乞付數字使弟知兩法兄近狀臨池不勝神溯復梅熟和尚兄書遠至如對面談真快暢矣聞在江南又與老和尚住四五年想一支佛法西還不使長松門庭冷落於夜郎鄉也前得本原兄及海月兄相繼而逝弟駭然痛黔南法運皆賴諸兄一肩擔荷今如此恐從此寥寥耳法兄既歸可還舊觀矣弟遣人往蘇候老人安便遣詣座下俟遲當另致賀使兄弟閒不致涼薄耳大端長松必要法兄主持方得無恙今聞梅隱諸兄皆不欲住持倘皆推諉不肯一肩擔當其任不在法兄其誰為之宜思之可也臨書不盡欲言與平越圓覺誠明符姪禪師有人來報吾海月和尚示寂於平越之圓覺菴使余吞聲痛恨不已黔州法道皆賴爾師與爾父行輩流通今聞爾師如此豈不長松腳下已自無振起於平越矣余以遠在昆明不能來奠及慰吾姪一暢吾梗塞奈嵩山無人代守是以屢舉屢止耳然吾姪天資既高加以誠實當一切時力行只履踐到古人田地方慰爾師於寂光土中亦是吾姪大孝也近來法門雖盛總之濫觴甚矣想吾姪自是高明必不負爾師所囑倘有便人乞寄一音為感記遊雞山記十年十月二十八日至賓川使君衛公館余城東上帝閣從近雲樓望孟獲砦雖巖石錯落雲樹蓊鬱而前古策畫雄風尚存暨尋諸葛武侯祠已在垝垣殘瓦古柏荒臺中矣惟若水金沙可掬蠻煙漁火相照而已顧橙橘則帶霜而黃俯血草則連暮而惛晚嵐靄靄若動若止雪山峨峨似斷似續回首望前峰則日已在崦嵫下矣就宿報國寺中明日早發自金牛過練洞夾道松筠而蘿薜亦可人意逮度百節橋入拈花寺則又鼓鐘送晚矣輿馬亦自倦也主人張燈暖湯濯足飲食畢忽六花庭墜一鶴夢沈石壁蕭蕭佛火耿耿微諷自古關山隔從來客夜長乃與主人分寢矣既見曙色遙映雪光起促侍僧辭主人蹋雪就道則又凄然林木不可言狀矣至河子孔如洗心橋而寒不可忍望沙址村近和尚莊十指如椎呵亦不曲是日諸院耆艾候余道左略敘主賓於土主祠初展寒溫禮也已而輿馬復進人亦叢雜雖寒色亦可少逭不覺已過大士閣矣石鐘坡望瀑布若玉龍下自銀河塵心俱盡杳杳然入扳松之境也上缽盂山隱隱濃濃望巉巖則雲鶴爭飛松韻齊落而谿回峰簇間石鐘已在眉睫矣入三門登佛殿古制巍峨使人弗敢仰視真佛華世界也都人士與戒德禪流禮接遜讓色色可人既坐啜湯果縱談疇昔愛慕之懷今日始得一遂所欲洵足樂也然後主人拂榻知余倦欲睡也雖少就寢奈何玉墜銀鋪峰巒不可識而林木亦自無顏惟樓殿羅列儼然在一銀色世界中也是夜微有不快閱初三日早起望樓殿有旭色來映紗窗少閒大晴矣乃喚輿夫約宿衲命侍僧整理道具藜杖茶鐺翛然就道則喜入眉宇也而參錯銀樹黯淡藤葩尚自冷人眸子回巒深處梵宇連甍有金玉書皆名人墨蹟他如茅屋幽僻苔砌曲折梅竹滿塢雪毫在定未暇悉數而記也日在禺中始到迦葉殿登階舍采畢出眺遠近峰壑若吐若吞真令人一時領略不及也西行半里即楊輔玄天兩洞四壁皆有名人墨蹟袈裟石亦有題賦俯瞰胡猻梯而手攀足蹋者自遠視之若畫軸然此最佳景也憩小壘石上喫茶數杯方及絕頂頂上有小石城雖女堞零落而金殿無恙至此始得遠眺名勝東南則雪山羅川金沙若水西北則點蒼洱海玉關金齒西南則九頂賓昜諸葛營皆歷歷可數其餘近則若峰之聳石之墜種種靈奇幻怪一時難盡筆端遠則如玉柱插天銀山入地西望瑤池與峨眉東望匡廬與嶽麓絕肖一幅輿圖轉描轉奇也入文殊洞慶喜室古碑雖存而字畫苔食過半是以廚荒僧殘僅得其概到放光處觀舍身巖石𭗌壁削不敢俯視從此去太子洞曹溪水虎跳澗不遠矣攀蘿直上華首門在是即畢缽羅窟也縣巖萬仞飛壁千尋扣石作聲與磬無異匊泉洗目而翳可除靈禽依人主人延坐如在閬風顛矣時也雪風聒耳暮日沈澗急別主人歸到迦葉殿已黃昏也是夜宿看雪樓星月繞檐松風入榻覺古佛世界入我奚囊也明日遂歸石鐘至初六日啟明既沒庭旭方升飯食竟步自羅漢壁巖縣天際泉落峰閒百尺枯樹倒挂女蘿一塢蒼藤猶凝殘雪曲徑既幽澗松亦古入碧雲寺過幻空菴皆有姜公思睿遺跡階砌雖荒而寂歷之狀猶使人道心生也敢云歎息而去邪出外遠顧林杉幽密梵宮深杳則又不復知天大也去念佛堂而犬吠雪籬鐘傳冰壑一縱目閒又別是一世界也主人近微出接庭外須髮雖白風儀可觀賦詩一章以志獅子林有念佛法席耳是日風色稍暖乃促筍輿晉謁諸剎由悉檀寺寂光寺轉傳衣寺華嚴大覺等寺或品題泉味坐數花須或題詠亭榭揮毫石壁或與老僧相視而笑汲澗而烹真樂亦無窮也問之耆宿則靜室百有七十今所存者纔十一耳八大名藍唯大覺與石鐘可稱首焉至若山中龍象或凌雲高志或懷度世英姿與夫山形水勢人傑地靈又自有大儒君子載之典籍舊矣奚庸再贅今所筆者不過大略以俟他日回昆明有知己者問山靈雅致即舉以似之以當坐遊云耳
