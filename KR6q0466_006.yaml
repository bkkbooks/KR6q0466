body:
  text: 楚雄門人宗煓編歷代祖圖真贊始祖釋迦牟尼佛王宮非不貴愛彼雪嶺月可惜爛冬瓜雜此乾矢橛曹山說不如濟北何曾別洞水既逆流一翳著不得遙指殿裏的笑殺稱麻伯引起嶺南翁一棒要打殺打得殺八萬四千非鳳毛三十三人入虎穴第一世摩訶迦葉尊者黃金可鍛不知寶色完全素琴作舞何曾響在耳邊多子塔上無端分座拈華座下忽爾破顏及至親問金襴外卻道門前倒剎竿第二世阿難陀尊者持鉢真七佛儀式見鞭實千金駿才後來一呼便應方笑空打野榸畢鉢羅窟鴻業十方世界華開𣩦伽水闊二王悲哀中流迅急衆仙天來莫云終古秋江月不逐漁人下釣臺第三世商那和修尊者如來縣記巳張錦𠭘六年出胎實符斯讖自然服受氏九枝草作姓優茶林修鱗歸命龍奮迅鞠多得定三歸施地建梵宮百億河山入海印第四世優婆鞠多尊者我年十七師心非白從此得之五天取則波旬既伏三尸乃格籌室可盈聖論難測香衆無我我法印歸有德往復十八變虛空籌焚設利營卵塔第五世提多迦尊者山頂泉涌金日出屋入道之相無幽不燭出家非為身心兩語何其敏速遇同學當示無漏八千人一時攝伏跏趺本座歸去來十八神變是何物第六世彌遮迦尊者雖記梵天支離六劫窄路相逢兩兩饒舌舍彼邪徑悟此明月金色雲生知有聖哲頓使置器側立時家邦從此得安貼第七世婆須蜜尊者我獻寶座佛即記我釋迦法中華開七朵執酒器兮師宜識呈本姓兮頗羅墮智者來兮論義甘露灑兮得果示等虛空道大光腳下兒孫有幾箇第八世佛陀難提尊者頂有肉髻辨捷無礙神其無方大功不宰道兮萬世師德兮盈江海白光騰兮遙識至人口無言兮真是鼎鼐得來明月掌中觀塵剎清暉無不在第九世伏馱密多尊者父母非親諸佛非道不履不言至人大寶行七步雲月同發希聲非潦草有來瞻禮骨相非常七涌舍利光燭瑩皓平生家業盡與伊萬世傳之功浩浩第十世脅尊者夢協白象光瑩明珠兆生聖人百世之模脅不至席大道乃符功既偉矣德亦可孚馮君莫話封侯事一將功成萬骨枯第十一世富那夜舍尊者瞿曇種姓真體純粹一聞至言心明聖智木義踞義兮五百澤被得果得記兮真嗣乃遂跨鐵騎絶位次迥迥孤光一道明巖巖旁礡黃金地第十二世馬鳴大士王身不惜以衣贏者是有縣記六百歲也作無作兮功勝德不德兮呼馬有魔來風雨下既攝伏淚盈把示性海邪道舍結舌之辭似縣河箭鋒相柱如瓶瀉第十三世迦毗摩羅尊者未入虎穴先示魔宮震動山嶽終乃小蟲聽法兮禮背懺悔兮名通性海自今波浪闊一條紅線繫飛龍第十四世龍樹尊者大樹蔭覆聖師能來心雖自語其聲若雷白月開霧照此巖臺誦四韋陀兮雄辨善知衆藝兮恢諧筆智度兮衆流既匯現佛性兮福業可摧功存萬世流甘露從此天人結聖胎第十五世迦那提婆尊者昔躍龍門鉢水清灝一針投入解路全掃辨體相無相兮法眼圓明受聖記無記兮月輪光皓赤幡之下盡歸降銀碗盛雪日方杲第十六世羅睺羅多尊者解極無我辨誰前後是聖是凡齊入祖彀金水一味兮浮浮佛影溯流直上兮兩兩相遘杓柄從今把與人築著來時師子吼第十七世僧伽難提尊者莊嚴世適心存霞舉天光下垂路何修阻在井出井兮腹笥便便彼義此義兮微言楚楚繼祖位兮石窟我心鳴兮才諝可憐去國萬古霜利多師風吹幾許第十八世伽邪舍多尊者紫雲如盍冰鑒何埃童顏百歲決了無猜風鈴鳴兮不住我意寂兮心開有異氣兮將入是佛子兮歸來大家共奏無生曲明明鐵鋸舞三臺第十九世鳩摩羅多尊者應斯嘉運餘有千年答無者誰開門相延得法眼兮敏捷化愚俗兮纏綿禍福相倚兮縈結靈寂不關兮翛然斜抱雲和深夜月清音流得到錦川第二十世闍夜多尊者感發宿緣智慧淵沖得法眼淨萬彙皆空至羅閲兮揚頓教抑辨慧兮小大雄發無漏智兮遍行已絶熱惱兮溫風安知千百年來事如今原委到震東第二十一世婆修盤頭尊者清淨無欲一食不臥禮光度師長年打坐久植德兮感毗婆以結壇將得果兮聞夜多以無作那提有道繼祖鐙千斤擔子許擔荷第二十二世摩拏羅尊者生來尊貴神力自多惡象為害撲之如蛾無礙兮全非今古化鶴兮太絶網羅隨流認性無憂喜一任春楊拂細波第二十三世鶴勒那尊者禱佛金幢持環來只誕雨天華香風四起去淫祀兮義正可馮誦般若兮鶴衆爰止示無作兮心開見虹貫兮嬰爾慈風遠扇釋焦枯慧日高縣終不已第二十四世師子尊者說無作功始醒大夢雖示虹讖其心不動遊罽賓兮慧辨小乘可還珠兮手開疾貢翩翩別去向南天萬里雲中看威鳳第二十五世婆舍斯多尊者神劍協夢明珠在手正說知見推門落臼抵中印兮默論可破隱南天兮任重敢苟哀哲人之難兮心傷繼先聖之譜兮陽九一縷絲重過千斤始得今朝師子吼第二十六世不如蜜多尊者智慧天至德性實良當為佛事聖道斯張王宮受具兮地震法眼圓淨兮道光海印從今歸勢至真乘代代繼流芳第二十七世般若多羅尊者厥來閭里瓔珞名章與汝同姓弓矢斯張憶往事兮經聲在耳開來許兮示我周行一棚錦繡付王子聖諦南來辨蕭梁第二十八世菩提達摩尊者珠光可辨慧性天從同學信邪化歸道統航海西來梁王引領蘆葦北度香山繼踵一華開兮翻異見稠林五葉茂兮化神州愚蠢歸去來兮歸去來慈風浩浩送春雷第二十九世慧可大師聲飛伊洛發為名言孔老不足嵩少日暾立雪不獲兮斷臂將心來安兮消魂皮髓分兮三拜風恙除兮道存誰知鴻業歸華夏心血枯兮是幾番第三十世僧粲大師姓字不留法藏可傳風恙何起如其心然內外兮猶帶瓦礫脫灑兮焉滯蹄筌誰縛兮一言可脫衣授兮道脈永年請看皖伯峰頭月一片清輝白帝邊第三十一世道信大師蘄春發祥聞道齠齔縛脫雙離高提海印脅不至席兮可師骨相稱奇兮韞瑾天書三降兮不起法眼五傳兮得髓波瀾從此滄冥深辟歷一聲天下震第三十二世弘忍大師松栽雲嶂眉豪如霜脫有聞道焉及遐荒撩起便行兮水遇童女冀一投宿兮諾惟父行隨乞活命非異非常七相不逮可蒼可黃長廊采壁才書偈衣鉢南歸日月長第三十三世慧能大師經聞客誦偈倩人書贏得一鉢久未寧居偶論風幡危言侃侃得歸南華宗社渠渠階級不立兮蘭蕙一物不中兮璠璵昌昌兩桂香寰宇漫道冰枯便不如第三十四世南嶽褱讓和尚安康瑞應白氣皇皇縣記在躬駿奔什邡磨磚可起禪坐天澤能潤道光名震天下月淨湖湘每向祝融峰頂望滔滔白浪涌衡陽第三十五世馬祖道一和尚一室燕坐徒自苦辛車兮牛兮乃得天真年來不少鹽醬心事何必重陳牛行虎視象踏師呻舌過鼻足雙輪南嶽嶺頭松自碧祝融萬古峙嶙峋第三十六世百丈褱海和尚鼻痛耳聾為定宗旨挂拂豎拂無風浪起撥野狐如空合空接斷際似水投水作為繩墨以柬臧否四海汪洋龍象仰止師王奮迅獸群空百世雄飛自在是第三十七世黃檗希運和尚鐵額隆起晃晃明珠大雄山下親捋虎須表歸宗而抑懶融批龍顏而召大夫不道無師狂禪懼己訶噇糟漢叢席無虞蒿支拂打白拈賊浪浪滹沱接海隅第三十八世臨濟義玄和尚蒿支三頓鐵拳兩揮看風顛漢弄陷虎機綱宗七事智決重圍活薶火葬於栽松之日辨魔柬異於燕京之畿赤肉團絶是非滅卻瞎驢正法眼四方八面看全威第三十九世興化存獎和尚毒中先師冤伸老覺酬君王之寶價辨文德之玉璞珠攃紫羅帳庭翔丹山鷟勘同參眼卓朔趁克賓誰顛撲雲居多載未消疑一喝猶能撼五嶽第四十世南院慧顆和尚嶽降河北道化汝南張大臨濟赤肉團邊不合落草繼武興化紫羅帳裏何用高談作家不啐啄達者誰再三截來兔角千鈞重且道如今誰荷擔第四十一世風穴延沼和尚讖憂似續理辨離微箭穿楊葉鵰落秋暉一切方掃卻狀似鐵牛機立不立非不非當年孤峻誰人並惟有郢陽春色肥第四十二世首山省念和尚放下平穩動容自豪新婦騎驢拙郎調高龍袖拂開全收草賊象王回顧可釣巨鰲寂子來時呈面目誰云近日乏題糕第四十三世汾陽善昭和尚身命放下敏捷有幾濟道大成光華煒煒根性或殊不遺葑菲金錫光搖六人奉重雪曲玉振十智詞偉一粒粳米而喫者無喜無嗔半陌紙錢而送出閒神野鬼稽首真師起太原至今河嶽浮春暐第四十四世石霜楚圜和尚崖柴長笑龍象蹴行河洛價重湖湘掩荊服唐明之辨詫神鼎之驚芝泉為之伯仲楊李而作弟兄貶諸方之邪謬汗書記之聲名足下兒孫分兩路滹沱月色倍常明第四十五世楊岐方會和尚兒孫遍地監寺休限魔佛盈衢努力擇揀斃殺死蛇頭揭開正法眼三腳驢慣踏人四料揀暗修棧栗棘金圈攃下來衲僧近日誰擔板第四十六世白雲守端和尚誦茶陵偈看笑裏刀一籌不及多嘴徒勞當其聲駭廬阜後世可則自餘色斥功甫今日尤豪接得東山揮白汗摩尼珠上動金豪第四十七世五祖法演和尚不拜屎字便辭錦里會盡古今一則難擬謁彼遠公探吾宗旨中書堂何所以下載清風而已矣扶宗忤逆雷為人推落水褰衣旋磨唱巴歌琉璃禪子何為耳第四十八世昭覺克勤和尚一場熱病稍間即歸一聲雞唱不覺神飛血濺梵天總之死中得活眉間挂劍原來竭世樞機碧巖集翻為落草小艷詩終備玄微天子非常賜顏色至今錦里雨華肥第四十九世虎丘紹隆和尚想酢生液終非涼腑去而之他飽餐法乳露胸於湛堂之前南蠻呼死心之祖開聖和州誠行誠伍章教平江循規循矩布慈雲澍甘雨是謂東山之嫡骨孫圓悟之瞌睡虎第五十世天童曇華和尚大洪染指未暢身心既炙昭覺章教可尋法語來妙喜之偈正宗歸太白之岑駕鐵船浮山頭白浪剔慧鐙朗室裏青陰佛魔掃朝野欽萬里風生太古音第五十一世天童咸傑和尚匡廬迢遙來入鄭舍明果菴頭萬事放下破沙盆玲玲瓏瓏末後句蕭蕭灑灑三十年看迷時悟時的二千歲笑縣羊賣狗者龍顏屢顧耎語少假骨薶中峰光搖四野雕戈可罷狼煙平萬里真風如可把第五十二世臥龍祖先和尚緣老拳下初動干戈一公室中漢語何多方丈裏有客可謂奔流度刃頂門上擢瞎可謂明逾玉珂摩尼隨色春日溫和赤手提來三尺劍銛鋒誰道更須磨第五十三世徑山師範和尚成都老堯首放舌光佛照索劍拓出青霜肚饑要飯喫此語何琅琅胡猻不用捉如水自湯湯神人偉衣冠把茆奉師旁椹衣頒大內法鼓震朝堂萬年正續薶金骨圓照塔頭正流芳第五十四世仰山祖欽和尚鐵橛易摧天目少假向上之談固疾難瀉百鍊爐中出來直是新鮮一株柏上開眸淚盈如把龍興初試刀大仰固宗社千椎鐘發送凌霄一莖草苫琉璃瓦第五十五世高峰原妙和尚密印故家淨慈危坐狗舐油鐺無字咬破忽然推落枕子遠客還故鄉不覺畫出貓兒階蟲何敢過佛來祖來劈面便唾鏡水湖山任往還眉豪觸碎須彌座第五十六世中峰明本和尚開公復來錢塘水緑梵唄未忘忽閲鐙録生以不生心心致疑流復泉流恍然別曲但度竹篦子此言何太毒風行草偃師踏象蹴二虎之下不容蹄兩刃之間不容足大元帝奉為國師十四葉而許慧續第五十七世千嵒元長和尚誕膺蕭山鞠於嫂氏脫白父行母敢或否習學靈芝念佛是課不作醯雞鵲聲得旨鼠食貓飯兮失卻鉢盂披襟待旦兮質師無詭眉毛留得挂珊瑚道風凜凜何終始第五十八世萬峰時蔚和尚光射樂清儒釋並暉見僧轍喜升公是歸虎跑三不是達蓬半年非止巖無見許住山兮陷𠭘伏龍圓相復叉手兮破圍鄧蔚山頭秋夜月年年常向太湖飛第五十九世寶藏普持和尚窟中師子威肅萬里繼席聖恩天人之軌喝起滹沱匝匝之波卷舒光福堂堂之旨爺口親宣鐙焰發蕊一十一傳至嵩山洪波浩浩巴江裏第六十世東明慧旵和尚丹陽故家問道雲間染指松公法印未安果林老子針芥相歡及見持祖大海波瀾心智不是兮兩絶朝昏發憤兮忘餐一拳打破天機泄手握靈蛇佛魔寒第六十一世海舟永慈和尚成都余氏師所寄焉大隨故家獨照月捐菴於岷嶺一坐八年見太初兮發藥謁無際兮深研出峽參學幾盡霜雪於諸老重登古道三掌面門於關前寄金縷與法眼偈續正傳以振東山翼善寺中雙塔在金陵從此月初圓第六十二世寶峰智瑄和尚吳江生范氏梓業亦何巧一朝建壽藏斧斤斫膚撓索醯聞責詞謝過求鏟草執爨常負棘兮起疑燎眉以豁然兮得道殺活拈來總現成天下叢林鬧浩浩第六十三世天奇本瑞和尚行商潁州偶猒世相徒步荊門當仁不讓能公舌頭有毒保寧誰字返障婆子喚豬兮哪哪全老作偈兮上上一朝識得東山機三尺莫邪勘龍象第六十四世無聞明聰和尚病僧告宿掌上明珠來歸宗社精進學途深究惟識此理何如了物非物兮忘念於心無心兮智符華山高突太行聳報爾叢林休塗糊第六十五世月心德寶和尚不重武辨緇衣是宜頭目可舍智道焉知隨禮能公得事僧儀走關嶺兮得體訪大覺兮繁詞一朝掩口兮止止兩地歸宗兮隨隨幾番紅了幾番黑拾得梨華第一枝第六十六世龍池正傳和尚父母未生聞之愈傷鐙華熚暴毛孔舒光始知古人示有多方北走燕京兮求為印可直通所得兮萬象回翔臨行一笠都盍覆魔子爭教亂度量第六十七世天童圜悟和尚踏倒銅棺頂捉得玉麒麟一段傷心事將舉似何人首倡金粟走殺衲僧攜歸太白一洗煙塵如今四海清如鏡萬紫千紅總是春第六十八世浮石通賢和尚當湖如鏡生此至人有出世志無金紫心禮雲棲而納戒走雲門以問津逢金粟兮示南熏之旨極真切兮得西來之春接得長松克家子衣鉢繩繩付子孫第六十九世山暉完璧和尚夢彼明月侯氏掌珠剃染寶峰身放當湖知師資有據真法印合符道重荊楚室中之子惟慧既拙名冠吳越江左之席惟師中孚繼川勤之獨步大演祖之規模不識當年趙相國重來亂世胡為乎憍陳如尊者鹿苑得解雞園悟音十方國土誰淺誰深寂寂僧堂燕坐明明百草橫身玉樓月上如雪金磬晴敲絶塵總之血盡啼無盡誰是人間八百春千歲寶掌和尚降神中印威烈建卯生來握拳七歲展又歌動百神泣世住千齡少魏晉來華夏建業尋僧肇洗鉢青猿下奉書白犬臨行囑慧雲不拒浮長老鐵骨環黃金秦望薶清灝有唐顯慶年吾師歸去了寶志公和尚皖山之上石頭之下翦刀鐵鏡隨身蕭灑十二面觀音僧繇莫能寫拈香與擇火此語何為者京都鄴都境上看一燭梁園寒照野天台智者大師金地召手石頭點首靜夜思量信為益友是真精進此意誰有獲旋陀羅兮錯綜開皇降書兮德厚夢協良宵國清實偶法身無為語自真莫教五湖笑破口寒山大師貌古形枯象行師視費卻國清鹽醬撈得鍋底查滓叫蒼蒼兮大乘指賊賊兮遂祕春來秋去天台山若問吾師祇者是拾得大師放下苕帚幾聲冷笑叉手卓立一色難肖那事如何相頭買帽杖批伽藍寺主夢告豐干饒舌閭丘又到好好年年霜月常皎皎明州布袋和尚終日笑面底事如何一箇布袋就地拖街頭等箇人鐵鷂過新羅不惜為君解依然自懡㦬天上天下無位次嵩山寺裏靜打坐佛圖澄禪師遠自西國來石趙畏如神腋下師有竅夜望如鐙明禍福既不爽遊戲走宸庭如今面目儼然在莫看眉豪帶雪深東林惠遠禪師遙憶香爐峰華雨潤幾重長揖雁門雪深栽白社松水春六時之蓮葉聲傳半夜之疏鐘開東方淨土之始祖樹西國銀臺之神工靈運有才不得入淵明無意卻相從永嘉真覺禪師一宿曹溪返太速南方不是安身處回來那怕語聲高伎死禪和休亂卜南山宣律大師集毗尼藏敘賓主詞張南山之法網修西國之真規心淨則白月高也道重則緇衣何之四方招提同日月三千衲子作威儀圭峰宗密禪師理極玄奧事通本始如來法藏非師則己禪源諸詮圓頓得旨豈比夫空守癡禪之默并執乎尋文狂慧之否朗然一月縣中天四海蕩平無魔子唐一行禪師巨鹿美人誰癡誰黠有老成風得普寂拔徵士盧鴻怪其穎脫陰陽讖書尤得深察中官稽首玄宗降轄社稷終吉新豐奏札聲鐘告寂山谷壘砎師今何歸二九十八康居尊者至人風度來灑甘露杜順仰師則天欽慕號金師子皇情眷注梵侶所馮朝貴相聚華巖法界惟師蜜布更有一般清趣在舉著令人生怕怖國一欽禪師逢徑則止臨安高岡威儀挺特道感君王龍王施地魔梵歸降馬師馳書一點何妨清風來何極萬古露堂堂青原思禪師聖論不為己露囊錐落何階級誰痛誰悲青原山黯黯淡淡曹溪路參參差差與鈯斧子鈍置者廝猶帶瓦礫疑殺阿誰盧陵米價傳千古只是時人總不知三藏玄奘法師天中劇談良駒出廄揚鑣帝城道重中冓誓往天竺詣闕直首既至燉煌淹留高昌郵驛諸國登踄渺茫雪山千仞鐵門遐荒𣩦伽委命化賊感商五天咸服六合清涼法藏來洛盛業皇皇溫敕幾降車駕翱翔四生仰賴九有蒙光為法忘軀鴻業在恩波洋溢滿大唐南泉普願禪師池昜秋色萬古充塞指牡丹兮大夫莫測道平常兮東院點肋豎起鎌刀兮草賊斬卻貓兒兮濺血隨分納些些橫身臥荊棘十八便解作活計狸奴白羖識不得趙州從諗禪師孟冬嚴寒言端語端廓然蕩豁會者猶難悔悔竊乘偷騎止止暗騙明謾對大王無力下榻勘婆子有毒誰餐稽首燕然真古佛衲僧千古仰波瀾巖頭奯禪師跨門便喝箭鋒新筈抬捺商量將鹽止渴密啓其意兮就中毒深尋常不同兮長天一鶚手裏蘭橈全彰縱奪莫莫是謂之彌天之惡雪峰存禪師證道鰲山肉癩皮頑有時如桶底脫有時似春色闌望州亭烏石嶺不錯僧堂前末後句何關大地撮來如粟粒珊瑚枕上淚痕斑雪竇顯禪師智門既得四明浪㳁道大德備終古不息細細扣諸方玄機孰可測莫待曉風吹桃華生紅色賊賊清風淅淅萬億國溈山祐禪師肋上書字古古怪怪放身倒臥歷歷明明密室商量疑殺後生楚水荊山月皎風清自從拾得火柴後淨瓶踢倒誰敢輕仰山寂禪師是誰在井可發深省自性宗通師承須秉得地得名奪人奪境劍刃動寒光插鍬秋星耿小釋迦打四藤條記風穴年深月遠九十七箇應自知天邊月色寒照影洞山介禪師無眼耳鼻舌打刀須是賓州鐵待有伴即來填井還他擔來雪無情不思議過水便喫跌橫抽寶劍接人天五位君臣天下則曹山寂禪師好箇三種墮端的四禁語覷井覷驢何彼何此咬住咬破誰生誰死好顛酒孝滿已若問而今是阿誰石頭土塊與瓦子雲門偃禪師推門拶卻腳何曾失便宜黃面浙子鈍置多時一字關如繫辭棒釋迦似小兒胡餅有汁屎橛無疑對一說倒一說靈樹之碑字無畫法眼益禪師在長慶兮得休且休過地藏兮看樓打樓最親切兮石頭指頭折子方兮鐵矛兜矛指凳子頌唯心聲優理優答慧超感李王橋流水流如今冷落清涼寺阿誰牚過度人舟大慧杲禪師參湛堂禪發杜撰機訪無盡於荊南筆尖上得銘詞見川勤於天寧熏風裏入無為斥默照握竹篦大根大器萬世師永明壽禪師總角之歲冠不茹葷七行俱下持此蓮經群羊跪聽般若緣深文穆憫師許以為僧入定鳥如尺鷃巢衣褶之不驚門前湖水日照明生宗鏡千門通一路如何更去外頭尋達觀紫柏大師處澆漓世扇象季風開人天徑降毒海龍宏法雖離難如處三禪宮草木都來感師德年年杲日縣太空憨山清大師叢林師表賢首嘉胤講論之餘即入禪定惟道是責誰管逆順注述汗牛衝棟名高帝王加敬砥柱狂瀾總謂之光吞海印蓮池宏大師栽烈火紅蓮挂苦海風蓬經綸法藏於指掌著作文章於大同主淨業以望重持木叉而高風十聲佛號歸安養七筆勾銷事事融雪嶠信禪師古雲門三字了得主人公無隔宿語有刺人鋒塗毒鼓器盡英雄喫杯茶脫去從容天王欲詔何由得卯塔春雲鎖碧空破山明禪師雲門牢籠不住惡聲四海遠布眉橫秋月胸藏武庫扣金粟兮灑甘雨臥高梁兮捉白兔剔錦江不夜之鐙栽大地無根之樹裁荊棘之刺芒蕩狼煙之狂霧烏乎惟師之德與日月而彌固天童悟老人濟北鎖鑰楊岐木鐸師表萬世人天開鑿萬里南來道樹天末醉祖堂中展挂時天龍八部皆依泊嵩山監院請髮白千莖眼空十方坐斷五湖把定三江玄要旨訣烏用鋪張不肖孫慧紹繼末光清暉皓皓在此南堂雞山大衆請浮石老人吳江古寺繞湖波倒駕鐵航髮已皤獨許長松一片月萬年光照九霄多堅長老請有驚人句無隔宿語一味骨硬誰肯遜理起臨濟宗得太白髓被山暉老人掜住咽喉依然落在他手掌裏如今挖窖深薶始得天龍歡喜文遠侍者請橫抽寶劍跡遁草賊洗清乾坤光暉日月價重江淮令行吳越萬里雲南為航為筏畢鉢窟前放過一著雞山大衆請山暉老人老師在黔南小子侍於左不聞有一字相逢只懡㦬今日在吳越為人重打鎖高沙信息通一紙遙示我堅長老可會麼是吾之師汝之祖只要汝識得則箇堅長老請者箇老阿師黔南不得住一身向吳江省覲盡生怖雙塔間明月楊州題柳樹福海集人天不肖未親附今日書此贊家私盡露布嵩山監院請老和尚入異類非三頭肖六臂釋迦彌勒是他奴人天衆前無所諱力斥德山口訶臨濟謂是天童之真孫實乃報恩之嫡裔你道是何人直年候太歲不易長老請袖裏著金椎掌上輪北斗無剎不見身問爾知得不道振五湖德被萬有燕額虎須驢腳佛手海印三昧天長地久汝焚兜樓故我稽首雞山大衆請印文禪師眉豪如雪臘高德重久遁山林懶隨海衆有規有則非靜非動即佛即心是幻是夢印水復印泥以上皆實供末後一段光倩誰相鼓弄非余強措詞贊此丹山鳳石鐘耆宿普足字德周八十三徒廣睿智請贊雞山開士維此德周髫年剃染二十南遊走遍吳越築著指頭理愧無言默契有由詩高齊己學越貫休四十年石鐘住持八十歲雞足寡儔鶴慶名儒高氏之遠裔迦葉的派祖山之前修
